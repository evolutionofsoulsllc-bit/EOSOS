/* Storage */
const _m={};
const LS={
  get(k){try{const v=localStorage.getItem("eos:"+k);return v?JSON.parse(v):null;}catch(e){return _m[k]||null;}},
  set(k,v){try{localStorage.setItem("eos:"+k,JSON.stringify(v));}catch(e){_m[k]=v;}},
  del(k){try{localStorage.removeItem("eos:"+k);}catch(e){delete _m[k];}},
  list(prefix){try{return Object.keys(localStorage).filter(k=>k.startsWith("eos:"+prefix)).map(k=>k.slice(4+prefix.length));}catch(e){return Object.keys(_m).filter(k=>k.startsWith(prefix)).map(k=>k.slice(prefix.length));}}
};
const encodeKey=(k)=>k.replace(/[^a-zA-Z0-9_:\-@.]/g,c=>"~"+c.charCodeAt(0).toString(16));
const DB={
  _col(){
    if(!window._db) throw new Error("Firebase not ready");
    return window._db.collection("eos");
  },
  async _wait(){
    if(window._db) return;
    await new Promise(res=>{
      const t=setInterval(()=>{if(window._db){clearInterval(t);res();}},50);
      setTimeout(()=>{clearInterval(t);res();},5000);
    });
  },
  async get(k){
    await this._wait();
    try{
      const doc=await this._col().doc(encodeKey(k)).get();
      if(doc.exists){return doc.data().v;}
    }catch(e){console.warn("[EOS] DB.get error",k,e);}
    return LS.get(k);
  },
  async set(k,v){
    await this._wait();
    try{
      const ek=encodeKey(k);
      if(v===null||v===undefined){
        await this._col().doc(ek).delete();
        LS.del(k);
        return;
      }
      await this._col().doc(ek).set({v,_k:k,_ts:Date.now()});
      LS.set(k,v);
    }catch(e){console.warn("[EOS] DB.set error",k,e);LS.set(k,v);}
  },
  async list(prefix){
    await this._wait();
    try{
      const ep=encodeKey(prefix);
      const snap=await this._col()
        .where(firebase.firestore.FieldPath.documentId(),">=",ep)
        .where(firebase.firestore.FieldPath.documentId(),"<",ep+"")
        .get();
      return snap.docs.map(d=>(d.data()._k||d.id).slice(prefix.length));
    }catch(e){console.warn("[EOS] DB.list error",prefix,e);return LS.list(prefix)||[];}
  }
};

/* Auth utilities */
function hashStr(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(36);}
function emailToUid(e){return'u'+hashStr(e.toLowerCase().trim());}
function makePwHash(e,p){return hashStr(e.toLowerCase().trim()+':EOS:'+p);}

function AuthField({val,setVal,placeholder,type="text",onSubmit}){
  return <input value={val} onChange={e=>setVal(e.target.value)} placeholder={placeholder}
    type={type} onKeyDown={e=>e.key==="Enter"&&onSubmit&&onSubmit()}

function AuthPage({onAuth}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState(""); const [pw,setPw]=useState(""); const [pw2,setPw2]=useState("");
  const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  const [showPw,setShowPw]=useState(false);

  const signup=async()=>{
    if(!email.trim()||!pw){setErr("Email and password are required.");return;}
    if(!/\S+@\S+\.\S+/.test(email)){setErr("Please enter a valid email address.");return;}
    if(pw.length<6){setErr("Password must be at least 6 characters.");return;}
    if(pw!==pw2){setErr("Passwords do not match.");return;}
    setLoading(true); setErr("");
    try{
      const uid=emailToUid(email);
      const existing=await DB.get("acct:"+uid);
      if(existing){setErr("An account with this email already exists. Please log in.");setLoading(false);return;}
      const acct={uid,email:email.toLowerCase().trim(),pwHash:makePwHash(email,pw),createdAt:Date.now()};
      await DB.set("acct:"+uid,acct);
      await DB.set("sess",{uid,email:email.toLowerCase().trim()},false);
      onAuth({uid,email:email.toLowerCase().trim(),isNew:true});
    }catch(e){setErr("Something went wrong. Please try again.");}
    setLoading(false);
  };

  const login=async()=>{
    if(!email.trim()||!pw){setErr("Email and password are required.");return;}
    setLoading(true); setErr("");
    try{
      const uid=emailToUid(email);
      const acct=await DB.get("acct:"+uid);
      if(!acct){setErr("No account found with this email. Please sign up.");setLoading(false);return;}
      if(acct.pwHash!==makePwHash(email,pw)){setErr("Incorrect password. Please try again.");setLoading(false);return;}
      await DB.set("sess",{uid,email:email.toLowerCase().trim()},false);
      const profile=await DB.get("profile:"+uid);
      onAuth({uid,email:email.toLowerCase().trim(),isNew:!profile,profile});
    }catch(e){setErr("Something went wrong. Please try again.");}
    setLoading(false);
  };

  const submit=mode==="signup"?signup:login;

  return (

/* ═══════════════════════════════════════════════════
   PROFILE SETUP — First Time
   ═══════════════════════════════════════════════════ */
function ProfileSetupPage({uid,email,onDone}){
  const [f,setF]=useState({name:"",location:"",bio:"",isPublic:false});
  const [step,setStep]=useState(0); const [saving,setSaving]=useState(false);
  const up=v=>setF(p=>({...p,...v}));
  const save=async()=>{
    if(!f.name.trim()){return;}
    setSaving(true);
    const profile={...f,uid,email,createdAt:Date.now()};
    try{
      await DB.set("profile:"+uid,profile);
      await DB.set("my-profile",profile);
    }catch(e){}
    onDone(profile);
  };
  const steps=[
    <div key="0">
      <div className="fd shimmer" style={{fontSize:16,letterSpacing:4,marginBottom:8}}>Welcome to EOS</div>
      <p className="fi" style={{fontSize:14,color:"rgba(237,232,223,.55)",fontStyle:"italic",lineHeight:1.8,marginBottom:28}}>You are now part of something rare. Before you explore, tell us who you are.</p>
      <div style={{marginBottom:14}}><label className="lbl">Your Name</label><input value={f.name} onChange={e=>up({name:e.target.value})} placeholder="What do the people call you?"/></div>
      <div style={{marginBottom:22}}><label className="lbl">Location (optional)</label><input value={f.location} onChange={e=>up({location:e.target.value})} placeholder="City, Country"/></div>
      <button className="btn btng" style={{width:"100%",justifyContent:"center",padding:13,fontSize:10}} onClick={()=>f.name.trim()&&setStep(1)} disabled={!f.name.trim()}>Continue →</button>
    </div>,
    <div key="1">
      <div className="fd shimmer" style={{fontSize:14,letterSpacing:3,marginBottom:8}}>Your Story</div>
      <p className="fi" style={{fontSize:13,color:"rgba(237,232,223,.55)",fontStyle:"italic",marginBottom:16,lineHeight:1.7}}>Optional — but powerful. Who are you and what are you building?</p>
      <div style={{marginBottom:18}}><textarea value={f.bio} onChange={e=>up({bio:e.target.value})} rows={4} placeholder="Share your story..."/></div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
        <div onClick={()=>up({isPublic:!f.isPublic})} style={{width:42,height:21,background:f.isPublic?"#059669":"rgba(255,255,255,.1)",borderRadius:11,cursor:"pointer",position:"relative",border:"1px solid rgba(255,255,255,.1)",transition:"background .3s",flexShrink:0}}>
          <div style={{width:15,height:15,background:"#fff",borderRadius:"50%",position:"absolute",top:2,left:f.isPublic?25:2,transition:"left .3s"}}/>
        </div>
        <div>
          <div style={{fontSize:12,fontWeight:500}}>{f.isPublic?"Public Profile":"Private Profile"}</div>
          <div style={{fontSize:11,color:"rgba(237,232,223,.48)"}}>Public profiles appear in Community for other members</div>
        </div>
      </div>
      <div style={{display:"flex",gap:9}}>
        <button className="btnh" style={{fontSize:10}} onClick={()=>setStep(0)}>← Back</button>
        <button className="btn btng" style={{flex:1,justifyContent:"center",padding:13,fontSize:10}} onClick={save} disabled={saving}>
          {saving?"Saving...":`Enter EOS ${f.isPublic?"(Public)":"(Private)"}`}
        </button>
      </div>
    </div>
  ];
  return (
    <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:18}}>
      <Sky/>
      <div className="modal r1" style={{position:"relative",zIndex:10,maxWidth:440,width:"100%"}}>
        <div style={{display:"flex",gap:5,marginBottom:24}}>{[0,1].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?"#C9A356":"rgba(255,255,255,.1)",transition:"background .4s"}}/>)}</div>
        {steps[step]}
      </div>
    </div>
  );
}

function NotificationBell({sid,onNav}){
  const [notifs,setNotifs]=useState([]);
  const [open,setOpen]=useState(false);
  const [lastSeen,setLastSeen]=useState(0);

  const load=async()=>{
    if(!sid)return;
    try{
      const keys=await DB.list("notif:"+sid+":");
      const items=await Promise.all(keys.map(k=>DB.get("notif:"+sid+":"+k)));
      const valid=items.filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0));
      setNotifs(valid);
    }catch(e){}
  };

  useEffect(()=>{
    load();
    const iv=setInterval(load,15000);
    return ()=>clearInterval(iv);
  },[sid]);

  const unseen=notifs.filter(n=>n.ts>(lastSeen||0)).length;

  const markSeen=()=>{setLastSeen(Date.now());setOpen(o=>!o);};

  const dismiss=async(n)=>{
    try{await DB.delete("notif:"+sid+":"+n.id,true);}catch(e){}
    setNotifs(p=>p.filter(x=>x.id!==n.id));
  };

  const dismissAll=async()=>{
    for(const n of notifs){try{await DB.delete("notif:"+sid+":"+n.id,true);}catch(e){}}
    setNotifs([]);setOpen(false);
  };

  const go=(n)=>{dismiss(n);setOpen(false);if(n.nav)onNav(n.nav);};

  const ICONS={friend:"👤",message:"✉️",comment:"💬",reply:"↩️"};

  return(
    <div style={{position:"relative"}}>
      <button onClick={markSeen} style={{position:"relative",background:"none",border:"1px solid rgba(255,255,255,.1)",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:15,flexShrink:0}}>
        🔔
        {unseen>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#ef4444",borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"'Cinzel',serif",fontWeight:700,lineHeight:1}}>{unseen>9?"9+":unseen}</span>}
      </button>
      {open&&<div style={{position:"fixed",inset:0,zIndex:299}} onClick={()=>setOpen(false)}/>}
      {open&&<div style={{position:"absolute",top:40,right:0,zIndex:300,width:300,background:"#0f1117",border:"1px solid rgba(255,255,255,.1)",borderRadius:6,boxShadow:"0 8px 32px rgba(0,0,0,.6)",overflow:"hidden"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px 10px",borderBottom:"1px solid rgba(255,255,255,.07)"}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:2,color:"rgba(237,232,223,.55)"}}>NOTIFICATIONS</span>
          {notifs.length>0&&<button onClick={dismissAll} style={{background:"none",border:"none",color:"rgba(237,232,223,.38)",cursor:"pointer",fontSize:10,fontFamily:"'Cinzel',serif",letterSpacing:1}}>Clear all</button>}
        </div>
        {notifs.length===0
          ?<div style={{padding:"24px 14px",textAlign:"center",color:"rgba(237,232,223,.38)",fontSize:12,fontStyle:"italic",fontFamily:"'Cormorant Garamond',serif"}}>All caught up ✦</div>
          :<div style={{maxHeight:340,overflowY:"auto"}}>
            {notifs.map(n=><div key={n.id} onClick={()=>go(n)} style={{display:"flex",gap:10,padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,.05)",cursor:"pointer",transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.04)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{ICONS[n.type]||"🔔"}</div>

                <div style={{fontSize:12,color:"rgba(237,232,223,.8)",lineHeight:1.5,marginBottom:3}}>{n.text}</div>

            </div>)}
          </div>
        }
      </div>}
    </div>
  );

  const blockUser=async(bsid,bname)=>{const updated=[...(blocked||[]),{sid:bsid,name:bname}];await DB.set("blocked:"+sid,updated);setBlocked(updated);const mk2=await DB.list("dm:"+sid+":");const keys=(mk2||[]).filter(k=>k.startsWith(bsid));await Promise.all(keys.map(k=>DB.set("dm:"+sid+":"+k,null)));setInbox(p=>(p||[]).filter(m=>m.fromSid!==bsid));setToast("User blocked.");};
  const unblock=async(bsid)=>{const updated=(blocked||[]).filter(x=>x.sid!==bsid);await DB.set("blocked:"+sid,updated);setBlocked(updated);};
  const deleteSingleMsg=async(msg)=>{await DB.set("dm:"+sid+":"+msg.id,null);setInbox(p=>(p||[]).filter(m=>m.id!==msg.id));};
  const sendReply=async(msg)=>{if(!replyMsg.trim())return;const id=uid();const dm={id,fromSid:sid,fromName:user?.name||"Anonymous",toSid:msg.fromSid,body:replyMsg.trim(),ts:Date.now()};await DB.set("dm:"+msg.fromSid+":"+id,dm);await sendNotif(msg.fromSid,"message",(user?.name||"Someone")+" replied to your message","profile");setReplyMsg("");setReplyTo(null);setToast("Reply sent!");};
  const sendCompose=async()=>{if(!composeTo||!composeMsg.trim())return;const id=uid();const dm={id,fromSid:sid,fromName:user?.name||"Anonymous",toSid:composeTo.sid,body:composeMsg.trim(),ts:Date.now()};await DB.set("dm:"+composeTo.sid+":"+id,dm);await sendNotif(composeTo.sid,"message",(user?.name||"Someone")+" sent you a message","profile");setComposeMsg("");setComposeTo(null);setToast("Message sent to "+composeTo.name+"!");};

  useEffect(()=>{(async()=>{
    const keys=await DB.list("profile:");const all=await Promise.all((keys||[]).map(k=>DB.get("profile:"+k)));setAllSouls(all.filter(s=>s&&s.isPublic));
    /* inbox — messages sent to my sid */
    const mk=await DB.list("dm:"+sid+":");const mi=await Promise.all((mk||[]).map(k=>DB.get("dm:"+sid+":"+k)));setInbox(mi.filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0)));
    /* friends & blocked */
    const fr=await DB.get("friends:"+sid)||[];setFriends(fr);
    const bl=await DB.get("blocked:"+sid)||[];setBlocked(bl);
    /* groups */
    const gk=await DB.list("group:");const gi=await Promise.all((gk||[]).map(k=>DB.get("group:"+k)));setGroups(gi.filter(g=>g&&(g.members||[]).includes(sid)));
  })();},[tab]);

  const loadDmThread=async(targetSid)=>{
    setDmTarget(targetSid);
    const k1=await DB.list("dm:"+sid+":"+targetSid);
    const k2=await DB.list("dm:"+targetSid+":"+sid);
    const [m1,m2]=await Promise.all([
      Promise.all(k1.map(k=>DB.get("dm:"+sid+":"+targetSid+":"+k))),
      Promise.all(k2.map(k=>DB.get("dm:"+targetSid+":"+sid+":"+k)))
    ]);
    const all=[...m1,...m2].filter(Boolean).sort((a,b)=>(a.ts||0)-(b.ts||0));
    setDmThread(all);
  };
  const sendDm=async()=>{
    if(!dmMsg.trim()||!dmTarget)return;
    const id=uid();const msg={id,from:sid,fromName:user?.name||"Anonymous",to:dmTarget,body:dmMsg,ts:Date.now()};
    await DB.set("dm:"+sid+":"+dmTarget+":"+id,msg);
    setDmMsg("");setDmThread(p=>[...p,msg]);
  };
  const createGroup=async()=>{
    if(!newGrp.name)return;
    const id=uid();const g={id,name:newGrp.name,desc:newGrp.desc,members:[sid],creator:sid,creatorName:user?.name||"Anonymous",ts:Date.now()};
    await DB.set("group:"+id,g);setGroups(p=>[...p,g]);setNewGrp({name:"",desc:""});setToast("Group created!");
  };
  const addMemberToGroup=async(g,targetSid,targetName)=>{
    if((g.members||[]).includes(targetSid)){setToast("Already a member");return;}
    const updated={...g,members:[...(g.members||[]),targetSid],memberNames:{...(g.memberNames||{}),[targetSid]:targetName}};
    await DB.set("group:"+g.id,updated);
    setActiveGrp(updated);setGroups(p=>p.map(x=>x.id===g.id?updated:x));
    // notify the added member via DM
    const notifId=uid();await DB.set("dm:"+targetSid+":"+notifId,{id:notifId,fromSid:sid,fromName:user?.name||"Anonymous",toSid:targetSid,body:"You've been added to the group '"+g.name+"' 🎉",ts:Date.now()},true);
    setToast(targetName+" added to group!");
  };
  const joinGroup=async(g)=>{if((g.members||[]).includes(sid))return;const updated={...g,members:[...(g.members||[]),sid]};await DB.set("group:"+g.id,updated);setGroups(p=>p.map(x=>x.id===g.id?updated:x));};
  const loadGrpThread=async(g)=>{
    setActiveGrp(g);
    const k=await DB.list("grpmsg:"+g.id+":");
    const msgs=await Promise.all((k||[]).map(mk=>DB.get("grpmsg:"+g.id+":"+mk)));
    setGrpThread(msgs.filter(Boolean).sort((a,b)=>(a.ts||0)-(b.ts||0)));
  };
  const sendGrpMsg=async()=>{
    if(!grpMsg.trim()||!activeGrp)return;
    const id=uid();const msg={id,from:sid,fromName:user?.name||"Anonymous",body:grpMsg,ts:Date.now()};
    await DB.set("grpmsg:"+activeGrp.id+":"+id,msg);
    setGrpMsg("");setGrpThread(p=>[...p,msg]);
  };

  const TABS=[["profile","Soul Profile"],["friends","Friends"],["inbox","Inbox"],["groups","Groups"]];
  return (
    <div className="page">
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      <PageHead onBack={onBack} title="IDENTITY" sub="Soul Profile" tag="Know thyself" grad="radial-gradient(circle at 32% 26%,#fff8d4,#f0c060 22%,#c98436 46%,#3a1a06 90%,#150800 100%)" glow="rgba(201,163,86,.6)"/>
      <div style={{maxWidth:760,margin:"0 auto",padding:"0 18px 80px"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:22}}>{TABS.map(([k,l])=><button key={k} className={"tab"+(tab===k?" on":"")} onClick={()=>setTab(k)}>{l}</button>)}</div>

        {tab==="profile"&&<>
          {/* ── Profile Header Card ── */}
          <div className="glassg" style={{borderRadius:6,padding:28,marginBottom:22,textAlign:"center",border:"1px solid rgba(201,163,86,.18)"}}>
            <div style={{width:70,height:70,borderRadius:"50%",background:"linear-gradient(135deg,rgba(201,163,86,.25),rgba(201,163,86,.08))",border:"2px solid rgba(201,163,86,.4)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:28,color:"#C9A356",fontFamily:"'Cinzel',serif"}}>
              {(user?.name||"?").charAt(0).toUpperCase()}
            </div>
            <div className="fs" style={{fontSize:16,letterSpacing:3,color:"#EDE8DF",marginBottom:4}}>{user?.name||"Anonymous Soul"}</div>
            {user?.location&&<div style={{fontSize:12,color:"rgba(237,232,223,.5)",marginBottom:8}}>📍 {user.location}</div>}
            {user?.bio&&<div className="fi" style={{fontSize:13,color:"rgba(237,232,223,.6)",fontStyle:"italic",lineHeight:1.7,marginBottom:14,maxWidth:380,margin:"0 auto 14px"}}>{user.bio}</div>}
            <div style={{display:"flex",justifyContent:"center",gap:20,flexWrap:"wrap",marginBottom:14}}>
              {user?.createdAt&&<div style={{textAlign:"center"}}>
                <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(201,163,86,.6)",marginBottom:3}}>JOINED</div>
                <div style={{fontSize:12,color:"rgba(237,232,223,.7)"}}>{new Date(user.createdAt).toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
              </div>}
              {(user?.values||[]).length>0&&<div style={{textAlign:"center"}}>
                <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(201,163,86,.6)",marginBottom:3}}>VALUES</div>
                <div style={{fontSize:12,color:"rgba(237,232,223,.7)"}}>{(user.values||[]).length} chosen</div>
              </div>}
              {(user?.skills||[]).length>0&&<div style={{textAlign:"center"}}>
                <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(201,163,86,.6)",marginBottom:3}}>GIFTS</div>
                <div style={{fontSize:12,color:"rgba(237,232,223,.7)"}}>{(user.skills||[]).length} listed</div>
              </div>}
            </div>
            {(user?.values||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
              {(user.values||[]).slice(0,5).map(v=><span key={v} className="tg" style={{fontSize:9}}>{v}</span>)}
              {(user.values||[]).length>5&&<span className="tg" style={{fontSize:9}}>+{user.values.length-5} more</span>}
            </div>}
          </div>
          <div className="fs" style={{fontSize:9,letterSpacing:3,color:"rgba(201,163,86,.5)",marginBottom:14}}>EDIT YOUR PROFILE</div>
          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10,marginBottom:18}}>
            <span style={{fontSize:12,color:"rgba(237,232,223,.55)"}}>Public Profile</span>
            <div className={"toggle"+(f.isPublic?" on":"")} onClick={()=>up({isPublic:!f.isPublic})} style={{width:42,height:21,background:f.isPublic?"#059669":"rgba(255,255,255,.1)",borderRadius:11,cursor:"pointer",position:"relative",border:"1px solid rgba(255,255,255,.1)",transition:"background .3s"}}>
              <div style={{width:15,height:15,background:"#fff",borderRadius:"50%",position:"absolute",top:2,left:f.isPublic?25:2,transition:"left .3s"}}/>
            </div>
          </div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Soul Name</label><input value={f.name} onChange={e=>up({name:e.target.value})} placeholder="Your name in the civilization"/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Location</label><input value={f.location} onChange={e=>up({location:e.target.value})} placeholder="City, Country"/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Your Story</label><textarea value={f.bio} onChange={e=>up({bio:e.target.value})} rows={4} placeholder="Who are you? What are you building?"/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Core Values</label><Pills opts={VALUES} sel={f.values} onChange={v=>up({values:v})}/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Gifts & Skills</label><Pills opts={SKILLS} sel={f.skills} onChange={v=>up({skills:v})}/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Seeking</label><Pills opts={SEEKING} sel={f.seeking} onChange={v=>up({seeking:v})}/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:22}}><label className="lbl">Current Focus</label><Pills opts={FOCUS} sel={f.focus} onChange={v=>up({focus:v})}/></div>
          <button className="btn btng" style={{width:"100%",justifyContent:"center",padding:14,fontSize:10,marginBottom:14}} onClick={save}>Save Soul Profile</button>
          {/* Sovereignty support */}
          <div className="glass" style={{borderRadius:4,padding:22,textAlign:"center",border:"1px solid rgba(201,163,86,.2)"}}>
            <div className="fs" style={{fontSize:10,letterSpacing:2,color:"rgba(201,163,86,.8)",marginBottom:8}}>SOVEREIGNTY SUPPORT</div>
            <p className="fi" style={{fontSize:14,color:"rgba(237,232,223,.68)",fontStyle:"italic",marginBottom:16,lineHeight:1.65}}>Get support with becoming sovereign for yourself and your children — health, education, and legal sovereignty.</p>
            <a href="https://vedarevival.com?af=af698299c5e1012" target="_blank" rel="noreferrer" className="btn btng" style={{display:"inline-flex",textDecoration:"none",padding:"11px 28px",fontSize:10}}>Get Sovereignty Support</a>
          </div>
        </>}

        {tab==="inbox"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div className="fs" style={{fontSize:10,letterSpacing:3,color:"rgba(237,232,223,.48)"}}>Messages Received</div>
            {friends.length>0&&<button className="btn btng" style={{fontSize:9,padding:"6px 14px"}} onClick={()=>setComposeTo(friends[0])}>✉ New Message</button>}
          </div>
          {composeTo&&<div className="glassg" style={{borderRadius:4,padding:18,marginBottom:16,border:"1px solid rgba(201,163,86,.2)"}}>
            <div className="fs" style={{fontSize:10,letterSpacing:2,color:"rgba(201,163,86,.7)",marginBottom:10}}>NEW MESSAGE</div>
            <div style={{marginBottom:10}}>
              <label className="lbl">To</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
                {friends.map(f=><button key={f.sid} className={"pill"+(composeTo.sid===f.sid?" on":"")} onClick={()=>setComposeTo(f)}>{f.name}</button>)}
              </div>
            </div>
            <textarea value={composeMsg} onChange={e=>setComposeMsg(e.target.value)} rows={3} placeholder={"Write to "+composeTo.name+"..."} style={{marginBottom:8}}/>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btng" style={{fontSize:9,padding:"7px 16px"}} onClick={sendCompose} disabled={!composeMsg.trim()}>Send</button>
              <button className="btnh" style={{fontSize:9}} onClick={()=>{setComposeTo(null);setComposeMsg("");}}>Cancel</button>
            </div>
          </div>}
          {(inbox||[]).filter(m=>!blocked.find(b=>b.sid===m.fromSid)).length===0
            ?<div style={{textAlign:"center",padding:52}}><div className="fs" style={{fontSize:12,letterSpacing:2,color:"rgba(237,232,223,.38)"}}>No messages yet</div><p className="fi" style={{fontSize:14,color:"rgba(237,232,223,.38)",marginTop:8,fontStyle:"italic"}}>When someone sends you a message, it appears here</p></div>
            :<div style={{display:"flex",flexDirection:"column",gap:12}}>{(inbox||[]).filter(m=>!blocked.find(b=>b.sid===m.fromSid)).map(m=><div key={m.id} className="glass" style={{borderRadius:4,padding:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <span className="fs" style={{fontSize:10,letterSpacing:1,color:"rgba(201,163,86,.8)"}}>{m.fromName}</span>
                <span style={{fontSize:11,color:"rgba(237,232,223,.38)"}}>{m.ts?new Date(m.ts).toLocaleDateString():""}</span>
              </div>
              <div style={{fontSize:14,color:"rgba(237,232,223,.8)",lineHeight:1.6,marginBottom:12}}>{m.body}</div>
              {replyTo===m.id&&<div style={{marginBottom:10}}>
                <textarea value={replyMsg} onChange={e=>setReplyMsg(e.target.value)} rows={2} placeholder="Write a reply..." style={{marginBottom:8}}/>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btng" style={{fontSize:9,padding:"6px 14px"}} onClick={()=>sendReply(m)}>Send Reply</button>
                  <button className="btnh" style={{fontSize:9}} onClick={()=>{setReplyTo(null);setReplyMsg("");}}>Cancel</button>
                </div>
              </div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button className="btnh" style={{fontSize:9}} onClick={()=>{setReplyTo(m.id);setReplyMsg("");}}>↩ Reply</button>
                {!friends.find(f=>f.sid===m.fromSid)&&allSouls.find(s=>s.uid===m.fromSid)&&<button className="btnh" style={{fontSize:9}} onClick={()=>addFriend(allSouls.find(s=>s.uid===m.fromSid))}>+ Add Friend</button>}
                <button className="btnh" style={{fontSize:9}} onClick={()=>deleteSingleMsg(m)}>🗑 Delete</button>
                <button className="btnh" style={{fontSize:9,color:"rgba(239,68,68,.6)",borderColor:"rgba(239,68,68,.2)"}} onClick={()=>blockUser(m.fromSid,m.fromName)}>🚫 Block</button>
              </div>
            </div>)}
          </div>}
          {blocked.length>0&&<div style={{marginTop:24}}>
            <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(237,232,223,.38)",marginBottom:10}}>BLOCKED</div>
            {blocked.map(b=><div key={b.sid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"rgba(239,68,68,.05)",border:"1px solid rgba(239,68,68,.1)",borderRadius:3,marginBottom:6}}>
              <span style={{fontSize:12,color:"rgba(237,232,223,.55)"}}>{b.name}</span>
              <button className="btnh" style={{fontSize:9}} onClick={()=>unblock(b.sid)}>Unblock</button>
            </div>)}
          </div>}
        </div>}
        {tab==="friends"&&<div>
          <div className="fs" style={{fontSize:10,letterSpacing:3,color:"rgba(237,232,223,.48)",marginBottom:18}}>Your Connections</div>
          {friends.length===0
            ?<div style={{textAlign:"center",padding:52}}><div className="fs" style={{fontSize:12,letterSpacing:2,color:"rgba(237,232,223,.38)"}}>No friends yet</div><p className="fi" style={{fontSize:14,color:"rgba(237,232,223,.38)",marginTop:8,fontStyle:"italic"}}>Add friends from your inbox or the community directory</p></div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12,marginBottom:28}}>
              {friends.map(fr=><div key={fr.sid} className="glass" style={{borderRadius:4,padding:18,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:"rgba(201,163,86,.15)",border:"1px solid rgba(201,163,86,.3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:15,color:"#C9A356",fontFamily:"'Cinzel',serif"}}>{(fr.name||"?").charAt(0).toUpperCase()}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fr.name}</div>
                  <button className="btnh" style={{fontSize:9}} onClick={()=>{setDmRecip(fr.sid);setTab("groups");}}>Message</button>
                </div>
                <button onClick={()=>removeFriend(fr.sid)} style={{background:"none",border:"none",color:"rgba(237,232,223,.38)",cursor:"pointer",fontSize:16,padding:4}} title="Remove friend">×</button>
              </div>)}
            </div>
          }
          <div style={{marginTop:24,textAlign:"center"}}>
            <div className="fi" style={{fontSize:13,color:"rgba(237,232,223,.55)",fontStyle:"italic",marginBottom:14}}>Search the community to find souls by skill, value, or name</div>
            <button className="btn btng" style={{padding:"12px 28px",fontSize:10}} onClick={onGoToCommunity}>🔍 Find People in Community</button>
          </div>
        </div>}
        {tab==="groups"&&<div>
          {!activeGrp
            ?<div>
              <div className="fs" style={{fontSize:10,letterSpacing:3,color:"rgba(237,232,223,.48)",marginBottom:14}}>Your Groups</div>
              {groups.length>0&&<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:22}}>
                {(groups||[]).map(g=><button key={g.id} className="glass lift" style={{borderRadius:4,padding:18,textAlign:"left",cursor:"pointer",width:"100%"}} onClick={()=>loadGrpThread(g)}>
                  <div className="fs" style={{fontSize:11,letterSpacing:1,marginBottom:4}}>{g.name}</div>
                  {g.desc&&<div className="fi" style={{fontSize:13,color:"rgba(237,232,223,.55)",fontStyle:"italic"}}>{g.desc}</div>}
                  <div style={{fontSize:11,color:"rgba(237,232,223,.38)",marginTop:5}}>{(g.members||[]).length} members</div>
                </button>)}
              </div>}
              <div className="glassg" style={{borderRadius:4,padding:22,marginBottom:16}}>
                <div className="fs" style={{fontSize:10,letterSpacing:2,marginBottom:14,color:"rgba(201,163,86,.7)"}}>CREATE A GROUP</div>
                <div style={{marginBottom:10}}><label className="lbl">Group Name</label><input value={newGrp.name} onChange={e=>setNewGrp(p=>({...p,name:e.target.value}))} placeholder="e.g. Soul Sisters, My Study Circle"/></div>
                <div style={{marginBottom:14}}><label className="lbl">Description</label><input value={newGrp.desc} onChange={e=>setNewGrp(p=>({...p,desc:e.target.value}))} placeholder="What's this group about?"/></div>
                <button className="btn btng" style={{fontSize:10}} onClick={createGroup} disabled={!newGrp.name}>Create Group</button>
              </div>
            </div>
            :<div>
              <button className="btnh" style={{marginBottom:14,fontSize:10}} onClick={()=>setActiveGrp(null)}>← Back to groups</button>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div className="fs" style={{fontSize:12,letterSpacing:2}}>{activeGrp.name}</div>
                <div style={{fontSize:11,color:"rgba(237,232,223,.38)"}}>{(activeGrp.members||[]).length} members</div>
              </div>
              {activeGrp.desc&&<div className="fi" style={{fontSize:13,color:"rgba(237,232,223,.55)",fontStyle:"italic",marginBottom:10}}>{activeGrp.desc}</div>}
              {activeGrp.creator===sid&&<details style={{marginBottom:14}}>
                <summary style={{fontSize:10,letterSpacing:2,color:"rgba(201,163,86,.6)",fontFamily:"'Cinzel',serif",cursor:"pointer",marginBottom:8}}>+ ADD MEMBERS</summary>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>
                  {(allSouls||[]).filter(s=>s.uid!==sid&&!(activeGrp.members||[]).includes(s.uid)).length===0
                    ?<div style={{fontSize:12,color:"rgba(237,232,223,.38)",fontStyle:"italic"}}>Everyone in the community is already a member</div>
                    :(allSouls||[]).filter(s=>s.uid!==sid&&!(activeGrp.members||[]).includes(s.uid)).map(s=><div key={s.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"rgba(255,255,255,.03)",borderRadius:3,border:"1px solid rgba(255,255,255,.1)"}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:500}}>{s.name}</div>
                        {s.location&&<div style={{fontSize:10,color:"rgba(237,232,223,.48)"}}>📍 {s.location}</div>}
                      </div>
                      <button className="btn btng" style={{fontSize:9,padding:"5px 12px"}} onClick={()=>addMemberToGroup(activeGrp,s.uid,s.name)}>Add</button>
                    </div>)
                  }
                </div>

function BreathModal({pattern,onClose}){
  const [phase,setPhase]=useState("idle");
  const [count,setCount]=useState(0);
  const [round,setRound]=useState(0);
  const [done,setDone]=useState(false);
  const timerRef=useRef(null);
  const runPhases=useRef(null);

  const start=()=>{
    if(phase!=="idle"&&!done)return;
    setDone(false);setRound(0);setPhase("idle");
    let r=0,pi=0;
    const next=()=>{
      if(r>=pattern.rounds){setPhase("done");setDone(true);return;}
      const ph=pattern.phases[pi];
      setPhase(ph.type||ph.l.toLowerCase().includes("hold")?"hold":ph.l.toLowerCase().includes("exhale")||ph.l.toLowerCase().includes("out")?"out":"in");
      setCount(ph.s);
      let c=ph.s;
      const tick=setInterval(()=>{
        c--;
        setCount(c);
        if(c<=0){
          clearInterval(tick);
          pi=(pi+1)%pattern.phases.length;
          if(pi===0)r++;
          setRound(r+1);
          next();
        }
      },1000);
      timerRef.current=tick;
    };
    next();
  };

  useEffect(()=>()=>{if(timerRef.current)clearInterval(timerRef.current);},[]);

  const phaseColor={idle:"rgba(20,184,166,.07)",in:"rgba(20,184,166,.38)",hold:"rgba(201,163,86,.3)",out:"rgba(59,130,246,.28)",done:"rgba(52,211,153,.28)"};
  const phaseScale={idle:"1",in:"1.25",hold:"1.22",out:".82",done:"1"};
  const phaseName={idle:"Tap to Begin",in:"Breathe In",hold:"Hold",out:"Breathe Out",done:"Complete ✓"};
  const currentPhase=done?"done":phase;
  const pLabel=pattern.phases.find(p=>p.l.toLowerCase().includes("hold")&&currentPhase==="hold"?"hold":true)?.l||phaseName[currentPhase];

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",padding:18}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal r1" style={{maxWidth:400,width:"100%",textAlign:"center"}}>
        <div className="fs" style={{fontSize:13,letterSpacing:3,marginBottom:2,color:pattern.color}}>{pattern.name}</div>
        <div style={{fontSize:11,color:"rgba(237,232,223,.48)",marginBottom:22,fontStyle:"italic"}}>{pattern.desc}</div>
        <div onClick={start} style={{width:170,height:170,borderRadius:"50%",background:phaseColor[currentPhase],border:"2px solid "+(currentPhase==="idle"?"rgba(255,255,255,.12)":pattern.color+"88"),margin:"0 auto 20px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"all "+(phase==="in"?"4s":"2s")+" ease",transform:"scale("+phaseScale[currentPhase]+")",boxShadow:currentPhase!=="idle"?"0 0 48px "+pattern.color+"44":"none"}}>
          <div style={{fontSize:34,fontWeight:300,color:done?"#34d399":pattern.color,lineHeight:1}}>{count>0?count:""}</div>
          <div className="fi" style={{fontSize:12,color:"rgba(237,232,223,.68)",marginTop:4,fontStyle:"italic"}}>{phaseName[currentPhase]}</div>
        </div>
        <div style={{fontSize:11,color:"rgba(237,232,223,.48)",marginBottom:8}}>Round {Math.min(round,pattern.rounds)} of {pattern.rounds}</div>
        <div style={{display:"flex",justifyContent:"center",gap:5,marginBottom:18}}>
          {Array.from({length:pattern.rounds},(_,i)=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:i<round?"#2dd4bf":"rgba(255,255,255,.1)",transition:"background .5s"}}/>)}
        </div>
        <div style={{background:"rgba(255,255,255,.03)",borderRadius:3,padding:12,marginBottom:16,textAlign:"left"}}>
          <div style={{fontSize:10,letterSpacing:1,color:"rgba(237,232,223,.38)",marginBottom:5}}>THE SCIENCE</div>
          <p style={{fontSize:12,color:"rgba(237,232,223,.55)",lineHeight:1.55}}>{pattern.benefit}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          {done&&<button className="btn btng" style={{flex:1,justifyContent:"center",fontSize:10}} onClick={()=>{setDone(false);setRound(0);setPhase("idle");setCount(0);}}>Again</button>}
          <button className="btnh" style={{flex:1,justifyContent:"center",fontSize:10}} onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

function StageCertificate({stage,xpMap,user}){
  const [showing,setShowing]=useState(false);
  const allDomains=Object.keys(CURRICULUM[stage.k]||{});
  const totalLessons=allDomains.reduce((a,dk)=>a+(CURRICULUM[stage.k][dk]||[]).length,0);
  const doneLessons=allDomains.reduce((a,dk)=>a+(CURRICULUM[stage.k][dk]||[]).filter(l=>xpMap[stage.k+"-"+dk+"-"+l.title]).length,0);
  const pct=totalLessons?Math.round(doneLessons/totalLessons*100):0;
  const complete=pct===100;
  const partial=pct>=50;
  const stageXP=allDomains.reduce((a,dk)=>{
    return a+(CURRICULUM[stage.k][dk]||[]).filter(l=>xpMap[stage.k+"-"+dk+"-"+l.title]).reduce((s,l)=>s+l.xp,0);
  },0);

  const CERT_COLORS={s1:"#34d399",s2:"#60a5fa",s3:"#a78bfa",s4:"#fbbf24"};
  const color=CERT_COLORS[stage.k]||"#C9A356";

  if(!partial) return(
    <div className="glass" style={{borderRadius:4,padding:18,textAlign:"center",opacity:.5}}>
      <div style={{fontSize:12,color:"rgba(237,232,223,.38)",fontStyle:"italic",fontFamily:"'Cormorant Garamond',serif"}}>Complete 50% of lessons to unlock your certificate</div>
      <div className="pbar" style={{marginTop:12,maxWidth:200,margin:"12px auto 0"}}><div className="pfill" style={{width:pct+"%",background:color}}/></div>
      <div style={{fontSize:10,color:"rgba(237,232,223,.38)",marginTop:6}}>{pct}% complete</div>
    </div>
  );

  return(
    <div>
      <button onClick={()=>setShowing(true)} className="glass lift" style={{width:"100%",borderRadius:4,padding:18,textAlign:"center",cursor:"pointer",border:"1px solid "+(complete?"rgba(201,163,86,.3)":"rgba(255,255,255,.1)")}}>
        <div style={{fontSize:20,marginBottom:6}}>{complete?"🏆":"🎓"}</div>
        <div className="fs" style={{fontSize:10,letterSpacing:2,color:complete?"#C9A356":color,marginBottom:4}}>
          {complete?"VIEW COMPLETION CERTIFICATE":"VIEW PROGRESS CERTIFICATE"}
        </div>
        <div style={{fontSize:11,color:"rgba(237,232,223,.48)"}}>{pct}% · {doneLessons}/{totalLessons} lessons · {stageXP} XP</div>
      </button>
      {showing&&<div className="overlay" onClick={()=>setShowing(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#13101f",border:"1px solid rgba(201,163,86,.3)",borderRadius:8,padding:"48px 40px",maxWidth:520,width:"90%",textAlign:"center",position:"relative",boxShadow:"0 0 60px rgba(201,163,86,.12)"}}>
          {/* Certificate decorative border */}
          <div style={{position:"absolute",inset:8,border:"1px solid rgba(201,163,86,.12)",borderRadius:6,pointerEvents:"none"}}/>
          <div style={{position:"absolute",inset:12,border:"1px solid rgba(201,163,86,.06)",borderRadius:4,pointerEvents:"none"}}/>

          {/* Header */}
          <div style={{fontSize:11,letterSpacing:4,color:"rgba(201,163,86,.5)",fontFamily:"'Cinzel',serif",marginBottom:6}}>EVOLUTION OF SOULS</div>
          <div style={{fontSize:10,letterSpacing:3,color:"rgba(237,232,223,.38)",fontFamily:"'Cinzel',serif",marginBottom:32}}>CONSCIOUS CURRICULUM</div>

          {/* Badge */}
          <div style={{width:80,height:80,borderRadius:"50%",background:"radial-gradient(circle,"+color+"22,"+color+"08)",border:"2px solid "+color+"55",margin:"0 auto 24px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>
            {complete?"🏆":"🎓"}
          </div>

          {/* Title */}
          <div style={{fontSize:13,letterSpacing:3,color:"rgba(237,232,223,.55)",fontFamily:"'Cinzel',serif",marginBottom:8}}>
            {complete?"CERTIFICATE OF COMPLETION":"CERTIFICATE OF PROGRESS"}

          {/* Recipient */}
          <div style={{fontSize:11,color:"rgba(237,232,223,.48)",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",marginBottom:8}}>This certifies that</div>
          <div style={{fontSize:26,color:"#EDE8DF",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",marginBottom:8}}>{user?.name||"Soul"}</div>
          <div style={{fontSize:11,color:"rgba(237,232,223,.48)",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",marginBottom:20}}>
            {complete?"has successfully completed":"has demonstrated dedicated progress in"}
          </div>

          {/* Stage */}
          <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.1)",borderRadius:4,padding:"14px 20px",marginBottom:20}}>
            <div style={{fontSize:20,marginBottom:6}}>{stage.icon}</div>

          {/* Stats row */}
          <div style={{display:"flex",justifyContent:"center",gap:24,marginBottom:24}}>
            {[["Lessons",doneLessons+"/"+totalLessons],["Progress",pct+"%"],["XP Earned",stageXP]].map(([l,v])=>(
              <div key={l}>
                <div style={{fontSize:16,color:"#EDE8DF",fontFamily:"'Cinzel',serif",marginBottom:3}}>{v}</div>
                <div style={{fontSize:9,letterSpacing:2,color:"rgba(237,232,223,.38)",fontFamily:"'Cinzel',serif"}}>{l.toUpperCase()}</div>
              </div>
            ))}
          </div>

          {/* Date */}
          <div style={{fontSize:10,color:"rgba(237,232,223,.38)",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",marginBottom:28}}>

          {/* Seal */}

            <div style={{height:"1px",width:60,background:"rgba(201,163,86,.2)"}}/>
          </div>

          <button onClick={()=>setShowing(false)} className="btn btng" style={{fontSize:9,padding:"10px 28px"}}>Close</button>
        </div>
      </div>}
    </div>
  );
}

  function QuizLesson({lesson,saveXP,stage,domain}){
    const [sel,setSel]=useState([]); const [checked,setChecked]=useState(false); const [qi,setQi]=useState(0);
    const [ldone,setLdone]=useState(false);
    const complete=()=>{if(ldone)return;setLdone(true);saveXP&&saveXP(stage+"-"+domain+"-"+lesson.title,lesson.xp);};
    const q=lesson?.q?.[qi];
    if(!q)return null;
    const check=()=>{setChecked(true);if(qi===lesson.q.length-1&&sel[qi]===q.a)complete();};
    const next=()=>{if(qi<lesson.q.length-1){setQi(qi+1);setChecked(false);}};
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div className="tg" style={{fontSize:8}}>Question {qi+1}/{lesson.q.length}</div>
          {ldone&&<span className="tg" style={{fontSize:8,background:"rgba(52,211,153,.1)",borderColor:"rgba(52,211,153,.28)",color:"#34d399"}}>Complete</span>}
        </div>
        <p className="fi" style={{fontSize:18,lineHeight:1.7,marginBottom:20,color:"#EDE8DF",fontStyle:"italic"}}>{q.q}</p>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {(q.o||[]).map((opt,i)=><button key={i} disabled={checked} onClick={()=>{const ns=[...sel];ns[qi]=i;setSel(ns);}} className={"choice"+(checked&&sel[qi]===i?(i===q.a?" ok":" no"):"")} style={{background:sel[qi]===i&&!checked?"rgba(255,255,255,.07)":"rgba(255,255,255,.03)",borderColor:sel[qi]===i&&!checked?"rgba(255,255,255,.2)":"rgba(255,255,255,.07)"}}>{opt}</button>)}
        </div>
        <div style={{marginTop:16,display:"flex",gap:9}}>
          {!checked&&sel[qi]!==undefined&&<button className="btn btng" onClick={check} style={{fontSize:10}}>Check Answer</button>}
          {checked&&qi<lesson.q.length-1&&<button className="btn btng" onClick={next} style={{fontSize:10}}>Next</button>}
          {checked&&sel[qi]===q.a&&<div style={{fontSize:13,color:"#34d399",display:"flex",alignItems:"center",gap:6,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic"}}>Correct ✓</div>}
        </div>
      </div>
    );
  }
  function JournalLesson({lesson,saveXP,stage,domain,sid}){
    const [t,setT]=useState("");
    const [ldone,setLdone]=useState(false);
    const complete=()=>{if(ldone||t.length<30)return;setLdone(true);saveXP&&saveXP(stage+"-"+domain+"-"+lesson.title,lesson.xp);};
    return(
      <div>

        {ldone&&<div style={{marginTop:12,color:"#34d399",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:14}}>Entry saved — {lesson.xp} XP earned ✦</div>}
      </div>
    );
  }
  function BreathLesson({lesson,saveXP,stage,domain}){
    const [phase,setPhase]=useState("idle"); const [r,setR]=useState(0); const [bdone,setBdone]=useState(false);
    const complete=()=>{if(bdone)return;setBdone(true);saveXP&&saveXP(stage+"-"+domain+"-"+lesson.title,lesson.xp);};
    const start=()=>{if(phase!=="idle")return;let rnd=0;const rounds=lesson.rounds||4;const runPhase=(phases,pi)=>{if(pi>=phases.length){rnd++;setR(rnd);if(rnd<rounds)runPhase(phases,0);else{setPhase("done");setBdone(true);complete();}return;}const ph=phases[pi];setPhase(ph.l);setTimeout(()=>runPhase(phases,pi+1),(ph.s||4)*1000);};runPhase(lesson.phases||[{l:"Inhale",s:4},{l:"Hold",s:4},{l:"Exhale",s:4},{l:"Hold",s:4}],0);};
    const PC={idle:"rgba(20,184,166,.07)",in:"rgba(20,184,166,.36)",hold:"rgba(201,163,86,.26)",out:"rgba(59,130,246,.26)",done:"rgba(52,211,153,.28)"};
    const currentPhase=lesson.phases&&lesson.phases.find(p=>p.l===phase);
    const bgColor=phase==="idle"?PC.idle:phase==="done"?PC.done:currentPhase?`rgba(59,130,246,.26)`:PC.idle;
    return(
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <div onClick={start} style={{width:160,height:160,borderRadius:"50%",background:bgColor,border:"2px solid rgba(20,184,166,.5)",margin:"0 auto 24px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 1s ease"}}>
          <div>
            <div className="fs" style={{fontSize:14,color:bdone?"#34d399":"rgba(237,232,223,.65)",letterSpacing:2}}>{phase==="idle"?"TAP":phase==="done"?"DONE":phase.toUpperCase()}</div>
            {r>0&&<div style={{fontSize:11,color:"rgba(237,232,223,.55)",marginTop:4}}>{r}/{lesson.rounds||4}</div>}
          </div>
        </div>
        {phase==="idle"&&!bdone&&<div style={{fontSize:12,color:"rgba(237,232,223,.38)"}}>Tap the circle to begin</div>}
        {lesson.phases&&<div style={{display:"flex",justifyContent:"center",gap:12,marginTop:16}}>
          {lesson.phases.map((p,i)=><div key={i} style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:"rgba(237,232,223,.55)",marginBottom:2}}>{p.l}</div>
            <div className="tg" style={{fontSize:9}}>{p.s}s</div>
          </div>)}
        </div>}
      </div>
    );
  }
  if(view==="lesson"&&lesson) return(
    <div className="page">
      <PageHead onBack={()=>{setLesson(null);setView("domain");}} title={lesson.title.toUpperCase()} sub={dom?.l||""} tag={lesson.xp+" XP"} grad="radial-gradient(circle at 32% 26%,#c5e0ff,#3b82f6 22%,#1d4ed8 46%,#0c1a42 90%,#050e22 100%)" glow={dom?.color||"#3b82f6"}/>
      <div style={{maxWidth:640,margin:"0 auto",padding:"0 18px 80px"}}>
        {lesson.type==="quiz"&&<QuizLesson lesson={lesson} saveXP={saveXP} stage={stage} domain={domain}/>}
        {lesson.type==="journal"&&<JournalLesson lesson={lesson} saveXP={saveXP} stage={stage} domain={domain} sid={sid}/>}
        {lesson.type==="breath"&&<BreathLesson lesson={lesson} saveXP={saveXP} stage={stage} domain={domain}/>}
        {!["quiz","journal","breath"].includes(lesson.type)&&<JournalLesson lesson={lesson} saveXP={saveXP} stage={stage} domain={domain} sid={sid}/>}
      </div>
    </div>
  );
  return null;
}

        {tab==="meetups"&&<div>

          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>{(meetups||[]).map(m=><div key={m.id} className="glass lift" style={{borderRadius:4,padding:20}}>

            <div style={{fontSize:12,color:"rgba(99,102,241,.7)",marginBottom:3}}>📍 {m.loc}</div>
            <div style={{fontSize:12,color:"rgba(201,163,86,.7)",marginBottom:8}}>📅 {m.date}</div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"rgba(237,232,223,.48)"}}>{(m.going||[]).length} going · by {m.organizer}</span>
              <button className="btn btng" style={{fontSize:9,padding:"6px 14px"}} onClick={()=>rsvp(m)} disabled={(m.going||[]).includes(sid)}>

        {tab==="new-meetup"&&<div style={{maxWidth:520}}>

            <div style={{marginBottom:12}}><label className="lbl">Event Title</label><input value={mf.title} onChange={e=>setMf(p=>({...p,title:e.target.value}))}/></div>

          </div>
        </div>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ADMIN PAGE
═══════════════════════════════════════════════════ */
function AdminPage({onBack}){
  const [tab,setTab]=useState("stats");
  const [members,setMembers]=useState([]);
  const [ideas,setIdeas]=useState([]);
  const [barters,setBarters]=useState([]);
  const [offgridList,setOffgridList]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState("");
  const [search,setSearch]=useState("");

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),3000);};
  const [annText,setAnnText]=useState("");
  const [annSending,setAnnSending]=useState(false);

  const sendAnnouncement=async()=>{
    if(!annText.trim())return;
    setAnnSending(true);
    try{
      // Save announcement
      const id="ann"+Date.now();
      await DB.set("announcement:"+id,{id,body:annText,ts:Date.now()});
      // Send notification to all members
      let sent=0;
      for(const m of members){
        try{await sendNotif(m.uid,"message","📣 EOS Announcement: "+annText.slice(0,60)+(annText.length>60?"...":""),"map");sent++;}catch(e){}
      }
      setAnnText("");
      showToast("Announcement sent to "+sent+" souls ✦");
    }catch(e){showToast("Error sending announcement");}
    setAnnSending(false);
  };

  useEffect(()=>{(async()=>{
    setLoading(true);
    try{
      const pk=await DB.list("profile:");
      const pi=await Promise.all(pk.map(k=>DB.get("profile:"+k)));
      const validProfiles=pi.filter(Boolean);
      const accts=await Promise.all(validProfiles.map(p=>DB.get("acct:"+p.uid)));
      const merged=validProfiles.map((p,i)=>({...p,...(accts[i]?{createdAt:accts[i].createdAt,email:accts[i].email}:{})}));
      setMembers(merged.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));

      const gpk=await DB.list("gov:");
      const gpi=await Promise.all(gpk.map(k=>DB.get("gov:"+k)));
      setIdeas(gpi.filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0)));

      const bk=await DB.list("barter:");
      const bi=await Promise.all(bk.map(k=>DB.get("barter:"+k)));
      setBarters(bi.filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0)));

      const og=await DB.get("offgrid-interest");
      setOffgridList(og||[]);
    }catch(e){}
    setLoading(false);
  })();},[]);

  const [confirmDelete,setConfirmDelete]=useState(null);

  const deleteAccount=async(m)=>{
    try{
      await DB.set("profile:"+m.uid,null);
      await DB.set("acct:"+m.uid,null);
      await DB.set("learn-xp:"+m.uid,null);
      await DB.set("gift-map:"+m.uid,null);
      setMembers(p=>p.filter(x=>x.uid!==m.uid));
      setConfirmDelete(null);
      showToast(m.name+"'s account has been removed");
    }catch(e){showToast("Error removing account");}
  };

  const removePost=async(type,item)=>{
    try{
      if(type==="idea"){await DB.set("gov:"+item.id,null);setIdeas(p=>p.filter(x=>x.id!==item.id));}
      if(type==="barter"){await DB.set("barter:"+item.id,null);setBarters(p=>p.filter(x=>x.id!==item.id));}
      showToast("Post removed");
    }catch(e){}
  };

  const filtered=members.filter(m=>!search||
    m.name?.toLowerCase().includes(search.toLowerCase())||
    m.email?.toLowerCase().includes(search.toLowerCase())||
    m.location?.toLowerCase().includes(search.toLowerCase())
  );

  // Location breakdown
  const locationMap={};
  members.forEach(m=>{if(m.location){const k=m.location.trim();locationMap[k]=(locationMap[k]||0)+1;}});
  const topLocations=Object.entries(locationMap).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // Values breakdown
  const valuesMap={};
  members.forEach(m=>(m.values||[]).forEach(v=>{valuesMap[v]=(valuesMap[v]||0)+1;}));
  const topValues=Object.entries(valuesMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const newThisWeek=members.filter(m=>(m.createdAt||0)>Date.now()-7*864e5).length;
  const newThisMonth=members.filter(m=>(m.createdAt||0)>Date.now()-30*864e5).length;

  const TABS=["stats","members","content","offgrid"];
  const TAB_ICONS={stats:"📊",members:"👥",content:"📋",offgrid:"🌿"};

  return(
    <div className="page">
      <PageHead onBack={onBack} title="ADMIN" sub="EOS Command Centre" tag={members.length+" souls in the civilization"} grad="radial-gradient(circle at 32% 26%,#1e2235,#1a2545 30%,#162050 60%,#0a1020 100%)" glow="rgba(201,163,86,.5)"/>
      {toast&&<div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",zIndex:500,background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.3)",borderRadius:4,padding:"10px 22px",fontSize:12,color:"#34d399",fontFamily:"'Cinzel',serif",letterSpacing:1}}>{toast}</div>}
      {confirmDelete&&<div className="overlay" onClick={()=>setConfirmDelete(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380,textAlign:"center"}}>
          <div style={{fontSize:24,marginBottom:12}}>⚠️</div>
          <div className="fd shimmer" style={{fontSize:14,letterSpacing:3,marginBottom:10}}>REMOVE ACCOUNT</div>
          <div style={{fontSize:13,color:"rgba(237,232,223,.68)",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",lineHeight:1.7,marginBottom:6}}>You are about to permanently remove</div>
          <div style={{fontSize:16,color:"#EDE8DF",fontFamily:"'Cinzel',serif",letterSpacing:1,marginBottom:6}}>{confirmDelete.name}</div>
          <div style={{fontSize:12,color:"rgba(237,232,223,.55)",marginBottom:24}}>{confirmDelete.email}</div>
          <div style={{fontSize:12,color:"rgba(237,232,223,.55)",marginBottom:24,lineHeight:1.6}}>This will delete their profile, account, and all personal data. This cannot be undone.</div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <button className="btn btng" style={{fontSize:9,padding:"10px 22px"}} onClick={()=>setConfirmDelete(null)}>Cancel</button>
            <button onClick={()=>deleteAccount(confirmDelete)} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.35)",borderRadius:3,color:"rgba(239,68,68,.9)",cursor:"pointer",fontSize:9,padding:"10px 22px",fontFamily:"'Cinzel',serif",letterSpacing:1}}>Yes, Remove</button>
          </div>
        </div>
      </div>}
      <div style={{maxWidth:860,margin:"0 auto",padding:"0 18px 80px"}}>

        <div style={{display:"flex",gap:7,marginBottom:24,flexWrap:"wrap"}}>
          {TABS.map(t=><button key={t} onClick={()=>setTab(t)} className={tab===t?"btn btng":"glass"} style={{fontSize:9,padding:"8px 16px",borderRadius:3,letterSpacing:1,fontFamily:"'Cinzel',serif",cursor:"pointer",color:tab===t?"":"rgba(237,232,223,.8)"}}>{TAB_ICONS[t]} {t.toUpperCase()}</button>)}
        </div>

        {loading&&<div style={{textAlign:"center",padding:60,color:"rgba(237,232,223,.68)",fontStyle:"italic",fontFamily:"'Cormorant Garamond',serif",fontSize:16}}>Loading civilization data...</div>}

        {/* ── STATS ── */}
        {!loading&&tab==="stats"&&<div>
          <div className="glassg" style={{borderRadius:4,padding:20,marginBottom:22,borderLeft:"3px solid rgba(201,163,86,.5)"}}>
            <div className="fs" style={{fontSize:9,letterSpacing:2,color:"#C9A356",marginBottom:10}}>📣 BROADCAST TO ALL SOULS</div>
            <div style={{display:"flex",gap:10}}>
              <input value={annText} onChange={e=>setAnnText(e.target.value)} placeholder="Write an announcement..." style={{flex:1,padding:"10px 14px",fontSize:12}} onKeyDown={e=>e.key==="Enter"&&sendAnnouncement()}/>
              <button className="btn btng" style={{fontSize:9,padding:"10px 18px",whiteSpace:"nowrap"}} onClick={sendAnnouncement} disabled={annSending||!annText.trim()}>{annSending?"Sending...":"Send ✦"}</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:11,marginBottom:28}}>
            {[
              ["Total Souls",members.length,"👥","#60a5fa"],
              ["New This Week",newThisWeek,"✨","#34d399"],
              ["New This Month",newThisMonth,"📅","#a78bfa"],
              ["Off-Grid Interest",offgridList.length,"🌿","#34d399"],
              ["Governance Ideas",ideas.length,"💡","#fbbf24"],
              ["Barter Posts",barters.length,"🔄","#fb923c"],
            ].map(([label,val,icon,color])=>(
              <div key={label} className="glassg" style={{borderRadius:4,padding:18,textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:6}}>{icon}</div>
                <div style={{fontSize:30,fontFamily:"'Cinzel',serif",color,marginBottom:5}}>{val}</div>
                <div style={{fontSize:9,letterSpacing:2,color:"rgba(237,232,223,.8)",fontFamily:"'Cinzel',serif"}}>{label.toUpperCase()}</div>
              </div>
            ))}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
            <div className="glass" style={{borderRadius:4,padding:18}}>
              <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(237,232,223,.8)",marginBottom:14}}>TOP LOCATIONS</div>
              {topLocations.length===0&&<div style={{color:"rgba(237,232,223,.55)",fontSize:12,fontStyle:"italic"}}>No data yet</div>}
              {topLocations.map(([loc,count])=>(
                <div key={loc} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.14)"}}>
                  <span style={{fontSize:12,color:"#EDE8DF"}}>{loc}</span>
                  <span className="tg" style={{fontSize:9}}>{count}</span>
                </div>
              ))}
            </div>
            <div className="glass" style={{borderRadius:4,padding:18}}>
              <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(237,232,223,.8)",marginBottom:14}}>TOP VALUES</div>
              {topValues.length===0&&<div style={{color:"rgba(237,232,223,.55)",fontSize:12,fontStyle:"italic"}}>No data yet</div>}
              {topValues.map(([val,count])=>(
                <div key={val} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.14)"}}>
                  <span style={{fontSize:12,color:"#EDE8DF"}}>{val}</span>
                  <span className="tg" style={{fontSize:9}}>{count}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="glass" style={{borderRadius:4,padding:18}}>
            <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(237,232,223,.8)",marginBottom:14}}>NEWEST MEMBERS</div>
            {members.slice(0,6).map(m=>(
              <div key={m.uid} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.14)"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(201,163,86,.1)",border:"1px solid rgba(201,163,86,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:11,color:"#C9A356",fontFamily:"'Cinzel',serif"}}>{(m.name||"?").charAt(0).toUpperCase()}</span>
                </div>
                <div style={{flex:1}}>
                  <span className="fs" style={{fontSize:10,letterSpacing:1,color:"rgba(237,232,223,.8)"}}>{m.name||"—"}</span>
                  {m.location&&<span style={{fontSize:10,color:"rgba(237,232,223,.8)",marginLeft:8}}>📍 {m.location}</span>}
                </div>
                <div style={{fontSize:10,color:"rgba(237,232,223,.55)"}}>{m.createdAt?new Date(m.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric"}):""}</div>
              </div>
            ))}
          </div>
        </div>}

        {/* ── MEMBERS ── */}
        {!loading&&tab==="members"&&<div>
          <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, email, or location..." style={{flex:1,padding:"9px 14px",fontSize:12}}/>
            <div className="tg" style={{fontSize:9,whiteSpace:"nowrap"}}>{filtered.length} souls</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {filtered.map(m=>(
              <div key={m.uid} className="glass" style={{borderRadius:4,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(201,163,86,.1)",border:"1px solid rgba(201,163,86,.22)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:13,color:"#C9A356",fontFamily:"'Cinzel',serif"}}>{(m.name||"?").charAt(0).toUpperCase()}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="fs" style={{fontSize:11,letterSpacing:1,color:"#EDE8DF",marginBottom:3}}>{m.name||"—"}</div>
                  <div style={{fontSize:11,color:"rgba(237,232,223,.8)"}}>{m.email||"—"}{m.location?" · 📍 "+m.location:""}</div>
                  {(m.values||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>{(m.values||[]).slice(0,4).map(v=><span key={v} className="tg" style={{fontSize:7,padding:"2px 6px"}}>{v}</span>)}</div>}
                </div>
                <div style={{fontSize:10,color:"rgba(237,232,223,.55)",flexShrink:0}}>{m.createdAt?new Date(m.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"}):""}</div>
                <button onClick={()=>setConfirmDelete(m)} style={{background:"none",border:"1px solid rgba(239,68,68,.25)",borderRadius:3,color:"rgba(239,68,68,.6)",cursor:"pointer",fontSize:9,padding:"5px 10px",fontFamily:"'Cinzel',serif",flexShrink:0}}>Remove</button>
              </div>
            ))}
          </div>
        </div>}

        {/* ── CONTENT ── */}
        {!loading&&tab==="content"&&<div>
          <div className="fs" style={{fontSize:9,letterSpacing:3,color:"rgba(237,232,223,.8)",marginBottom:12}}>GOVERNANCE IDEAS ({ideas.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:26}}>
            {ideas.length===0&&<div style={{color:"rgba(237,232,223,.55)",fontSize:12,fontStyle:"italic",padding:12}}>None yet</div>}
            {ideas.map(p=>(
              <div key={p.id} className="glass" style={{borderRadius:4,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div className="fs" style={{fontSize:10,letterSpacing:1,color:"rgba(237,232,223,.8)",marginBottom:3}}>{p.title}</div>
                  <div style={{fontSize:11,color:"rgba(237,232,223,.8)"}}>{p.fromName} · {p.ts?new Date(p.ts).toLocaleDateString():""}</div>
                </div>
                <button onClick={()=>removePost("idea",p)} style={{background:"none",border:"1px solid rgba(239,68,68,.2)",borderRadius:3,color:"rgba(239,68,68,.5)",cursor:"pointer",fontSize:9,padding:"5px 10px",fontFamily:"'Cinzel',serif",flexShrink:0}}>Remove</button>
              </div>
            ))}
          </div>
          <div className="fs" style={{fontSize:9,letterSpacing:3,color:"rgba(237,232,223,.8)",marginBottom:12}}>EXCHANGE BARTERS ({barters.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {barters.length===0&&<div style={{color:"rgba(237,232,223,.55)",fontSize:12,fontStyle:"italic",padding:12}}>None yet</div>}
            {barters.map(b=>(
              <div key={b.id} className="glass" style={{borderRadius:4,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div className="fs" style={{fontSize:10,letterSpacing:1,color:"rgba(237,232,223,.8)",marginBottom:3}}>{b.offering} ⇄ {b.seeking}</div>
                  <div style={{fontSize:11,color:"rgba(237,232,223,.8)"}}>{b.fromName} · {b.ts?new Date(b.ts).toLocaleDateString():""}</div>
                </div>
                <button onClick={()=>removePost("barter",b)} style={{background:"none",border:"1px solid rgba(239,68,68,.2)",borderRadius:3,color:"rgba(239,68,68,.5)",cursor:"pointer",fontSize:9,padding:"5px 10px",fontFamily:"'Cinzel',serif",flexShrink:0}}>Remove</button>
              </div>
            ))}
          </div>
        </div>}

        {/* ── OFF-GRID ── */}
        {!loading&&tab==="offgrid"&&<div>
          <div className="glassg" style={{borderRadius:4,padding:20,marginBottom:18,borderLeft:"3px solid rgba(52,211,153,.4)"}}>
            <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(52,211,153,.7)",marginBottom:4}}>TOTAL INTEREST</div>
            <div style={{fontSize:40,color:"#34d399",fontFamily:"'Cinzel',serif",marginBottom:4}}>{offgridList.length}</div>
            <div style={{fontSize:12,color:"rgba(237,232,223,.8)"}}>souls want to join an EOS land community</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {offgridList.length===0&&<div style={{color:"rgba(237,232,223,.55)",fontSize:12,fontStyle:"italic",padding:12}}>No interest registered yet</div>}
            {offgridList.map((entry,i)=>{
              const m=members.find(x=>x.uid===entry.uid);
              return(
              <div key={i} className="glass" style={{borderRadius:4,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:"rgba(52,211,153,.08)",border:"1px solid rgba(52,211,153,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:12,color:"#34d399",fontFamily:"'Cinzel',serif"}}>{(entry.name||"?").charAt(0).toUpperCase()}</span>
                </div>
                <div style={{flex:1}}>
                  <div className="fs" style={{fontSize:10,letterSpacing:1,color:"#EDE8DF",marginBottom:2}}>{entry.name||"—"}</div>
                  <div style={{fontSize:11,color:"rgba(237,232,223,.8)"}}>{m?.email||"—"}{entry.ts?" · "+new Date(entry.ts).toLocaleDateString():""}</div>
                </div>
              </div>
            );})}
          </div>
        </div>}

      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  render(){if(this.state.err)return <div style={{color:"#C9A356",padding:40,fontFamily:"Cinzel,serif",fontSize:12,letterSpacing:2}}>Something went wrong. <button onClick={()=>this.setState({err:null})} style={{background:"none",border:"1px solid rgba(201,163,86,.3)",color:"#C9A356",cursor:"pointer",padding:"6px 14px",fontFamily:"Cinzel,serif",fontSize:11,marginLeft:12}}>Retry</button></div>;return this.props.children;}
}

function App(){
  const [screen,setScreen]=useState("entry");
  const [authUser,setAuthUser]=useState(null);
  const [user,setUser]=useState(null);
  const sid=authUser?.uid||null;
  const goto=p=>setScreen(p);

  useEffect(()=>{(async()=>{
    try{
      const sess=await DB.get("sess");
      if(sess&&sess.uid){
        const profile=await DB.get("profile:"+sess.uid);
        setAuthUser(sess);
        if(profile) setUser(profile);
        setScreen("map");
      }
    }catch(e){}
  })();},[]);

  const handleAuth=async({uid,email,isNew,profile})=>{
    if(isNew){
      setAuthUser({uid,email});
      setTimeout(()=>setScreen("profile-setup"),0);
      return;
    }
    let p=profile;
    if(!p){try{p=await DB.get("profile:"+uid);}catch(e){}}
    setAuthUser({uid,email});
    if(p) setUser(p);
    setScreen("map");
  };

  const logout=async()=>{
    await DB.set("sess",null);
    setAuthUser(null);setUser(null);setScreen("entry");
  };

  if(screen==="entry") return <><Sky/><Entry onEnter={()=>setScreen("auth")} onAdmin={()=>setScreen("admin")}/></>;
  if(screen==="auth") return <><Sky/><AuthPage onAuth={handleAuth}/></>;
  if(screen==="profile-setup"&&authUser) return <><Sky/><ProfileSetupPage uid={authUser.uid} email={authUser.email} onDone={profile=>{setUser(profile);setScreen("welcome");}}/></>;
  if(screen==="welcome"&&user) return <WelcomeScreen user={user} onDone={()=>setScreen("map")}/>;
  if(screen==="map") return <><Sky/><IslandMap onNav={k=>goto(k)} onLogout={logout} user={user} sid={sid}/></>;
  if(screen==="admin") return <ErrorBoundary><AdminPage onBack={()=>setScreen("entry")}/></ErrorBoundary>;
  if(screen==="profile") return <ErrorBoundary><ProfilePage onBack={()=>goto("map")} sid={sid} user={user} setUser={setUser} onGoToCommunity={()=>goto("community")}/></ErrorBoundary>;
  if(screen==="community") return <ErrorBoundary><CommunityPage onBack={()=>goto("map")} user={user} sid={sid}/></ErrorBoundary>;
  if(screen==="culture") return <ErrorBoundary><CulturePage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="exchange") return <ErrorBoundary><ExchangePage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="wellness") return <ErrorBoundary><WellnessPage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="creation") return <ErrorBoundary><CreationPage onBack={()=>goto("map")} user={user}/></ErrorBoundary>;
  if(screen==="learning") return <ErrorBoundary><LearningPage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="governance") return <ErrorBoundary><GovernancePage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="offgrid") return <ErrorBoundary><OffGridPage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  return null;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);

</script>
</body>
</html>
