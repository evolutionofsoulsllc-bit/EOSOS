/* Storage */
const _m={};
const LS={
  get(k){try{const v=localStorage.getItem("eos:"+k);return v?JSON.parse(v):null;}catch(e){return _m[k]||null;}},
  set(k,v){try{localStorage.setItem("eos:"+k,JSON.stringify(v));}catch(e){_m[k]=v;}},
  del(k){try{localStorage.removeItem("eos:"+k);}catch(e){delete _m[k];}},
  list(prefix){try{return Object.keys(localStorage).filter(k=>k.startsWith("eos:"+prefix)).map(k=>k.slice(4+prefix.length));}catch(e){return Object.keys(_m).filter(k=>k.startsWith(prefix)).map(k=>k.slice(prefix.length));}}
};
const encodeKey=(k)=>k.replace(/[^a-zA-Z0-9_:\-@.]/g,c=>"~"+c.charCodeAt(0).toString(16));
const DB={
  _col(){
    if(!window._db) throw new Error("Firebase not ready");
    return window._db.collection("eos");
  },
  async _wait(){
    if(window._db) return;
    await new Promise(res=>{
      const t=setInterval(()=>{if(window._db){clearInterval(t);res();}},50);
      setTimeout(()=>{clearInterval(t);res();},5000);
    });
  },
  async get(k){
    await this._wait();
    try{
      const doc=await this._col().doc(encodeKey(k)).get();
      if(doc.exists){return doc.data().v;}
    }catch(e){console.warn("[EOS] DB.get error",k,e);}
    return LS.get(k);
  },
  async set(k,v){
    await this._wait();
    try{
      const ek=encodeKey(k);
      if(v===null||v===undefined){
        await this._col().doc(ek).delete();
        LS.del(k);
        return;
      }
      await this._col().doc(ek).set({v,_k:k,_ts:Date.now()});
      LS.set(k,v);
    }catch(e){console.warn("[EOS] DB.set error",k,e);LS.set(k,v);}
  },
  async list(prefix){
    await this._wait();
    try{
      const ep=encodeKey(prefix);
      const snap=await this._col()
        .where(firebase.firestore.FieldPath.documentId(),">=",ep)
        .where(firebase.firestore.FieldPath.documentId(),"<",ep+"")
        .get();
      return snap.docs.map(d=>(d.data()._k||d.id).slice(prefix.length));
    }catch(e){console.warn("[EOS] DB.list error",prefix,e);return LS.list(prefix)||[];}
  }
};

/* Auth utilities */
function hashStr(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(36);}
function emailToUid(e){return'u'+hashStr(e.toLowerCase().trim());}
function makePwHash(e,p){return hashStr(e.toLowerCase().trim()+':EOS:'+p);}

function AuthField({val,setVal,placeholder,type="text",onSubmit}){
  return <input value={val} onChange={e=>setVal(e.target.value)} placeholder={placeholder}
    type={type} onKeyDown={e=>e.key==="Enter"&&onSubmit&&onSubmit()}

function AuthPage({onAuth}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState(""); const [pw,setPw]=useState(""); const [pw2,setPw2]=useState("");
  const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  const [showPw,setShowPw]=useState(false);

  const signup=async()=>{
    if(!email.trim()||!pw){setErr("Email and password are required.");return;}
    if(!/\S+@\S+\.\S+/.test(email)){setErr("Please enter a valid email address.");return;}
    if(pw.length<6){setErr("Password must be at least 6 characters.");return;}
    if(pw!==pw2){setErr("Passwords do not match.");return;}
    setLoading(true); setErr("");
    try{
      const uid=emailToUid(email);
      const existing=await DB.get("acct:"+uid);
      if(existing){setErr("An account with this email already exists. Please log in.");setLoading(false);return;}
      const acct={uid,email:email.toLowerCase().trim(),pwHash:makePwHash(email,pw),createdAt:Date.now()};
      await DB.set("acct:"+uid,acct);
      LS.set("sess",{uid,email:email.toLowerCase().trim()});
      onAuth({uid,email:email.toLowerCase().trim(),isNew:true});
    }catch(e){setErr("Something went wrong. Please try again.");}
    setLoading(false);
  };

  const login=async()=>{
    if(!email.trim()||!pw){setErr("Email and password are required.");return;}
    setLoading(true); setErr("");
    try{
      const uid=emailToUid(email);
      const acct=await DB.get("acct:"+uid);
      if(!acct){setErr("No account found with this email. Please sign up.");setLoading(false);return;}
      if(acct.pwHash!==makePwHash(email,pw)){setErr("Incorrect password. Please try again.");setLoading(false);return;}
      await DB.set("sess",{uid,email:email.toLowerCase().trim()},false);
      const profile=await DB.get("profile:"+uid);
      onAuth({uid,email:email.toLowerCase().trim(),isNew:!profile,profile});
    }catch(e){setErr("Something went wrong. Please try again.");}
    setLoading(false);
  };

  const submit=mode==="signup"?signup:login;

  return (

/* ═══════════════════════════════════════════════════
   PROFILE SETUP — First Time
   ═══════════════════════════════════════════════════ */
function ProfileSetupPage({uid,email,onDone}){
  const [f,setF]=useState({name:"",location:"",bio:"",isPublic:false});
  const [step,setStep]=useState(0); const [saving,setSaving]=useState(false);
  const up=v=>setF(p=>({...p,...v}));
  const save=async()=>{
    if(!f.name.trim()){return;}
    setSaving(true);
    const profile={...f,uid,email,createdAt:Date.now()};
    try{
      await DB.set("profile:"+uid,profile);
      await DB.set("my-profile",profile);
    }catch(e){}
    onDone(profile);
  };
  const steps=[
    <div key="0">
      <div className="fd shimmer" style={{fontSize:16,letterSpacing:4,marginBottom:8}}>Welcome to EOS</div>
      <p className="fi" style={{fontSize:14,color:"rgba(237,232,223,.55)",fontStyle:"italic",lineHeight:1.8,marginBottom:28}}>You are now part of something rare. Before you explore, tell us who you are.</p>
      <div style={{marginBottom:14}}><label className="lbl">Your Name</label><input value={f.name} onChange={e=>up({name:e.target.value})} placeholder="What do the people call you?"/></div>
      <div style={{marginBottom:22}}><label className="lbl">Location (optional)</label><input value={f.location} onChange={e=>up({location:e.target.value})} placeholder="City, Country"/></div>
      <button className="btn btng" style={{width:"100%",justifyContent:"center",padding:13,fontSize:10}} onClick={()=>f.name.trim()&&setStep(1)} disabled={!f.name.trim()}>Continue →</button>
    </div>,
    <div key="1">
      <div className="fd shimmer" style={{fontSize:14,letterSpacing:3,marginBottom:8}}>Your Story</div>
      <p className="fi" style={{fontSize:13,color:"rgba(237,232,223,.55)",fontStyle:"italic",marginBottom:16,lineHeight:1.7}}>Optional — but powerful. Who are you and what are you building?</p>
      <div style={{marginBottom:18}}><textarea value={f.bio} onChange={e=>up({bio:e.target.value})} rows={4} placeholder="Share your story..."/></div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
        <div onClick={()=>up({isPublic:!f.isPublic})} style={{width:42,height:21,background:f.isPublic?"#059669":"rgba(255,255,255,.1)",borderRadius:11,cursor:"pointer",position:"relative",border:"1px solid rgba(255,255,255,.1)",transition:"background .3s",flexShrink:0}}>
          <div style={{width:15,height:15,background:"#fff",borderRadius:"50%",position:"absolute",top:2,left:f.isPublic?25:2,transition:"left .3s"}}/>
        </div>
        <div>
          <div style={{fontSize:12,fontWeight:500}}>{f.isPublic?"Public Profile":"Private Profile"}</div>
          <div style={{fontSize:11,color:"rgba(237,232,223,.48)"}}>Public profiles appear in Community for other members</div>
        </div>
      </div>
      <div style={{display:"flex",gap:9}}>
        <button className="btnh" style={{fontSize:10}} onClick={()=>setStep(0)}>← Back</button>
        <button className="btn btng" style={{flex:1,justifyContent:"center",padding:13,fontSize:10}} onClick={save} disabled={saving}>
          {saving?"Saving...":`Enter EOS ${f.isPublic?"(Public)":"(Private)"}`}
        </button>
      </div>
    </div>
  ];
  return (
    <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:18}}>
      <Sky/>
      <div className="modal r1" style={{position:"relative",zIndex:10,maxWidth:440,width:"100%"}}>
        <div style={{display:"flex",gap:5,marginBottom:24}}>{[0,1].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?"#C9A356":"rgba(255,255,255,.1)",transition:"background .4s"}}/>)}</div>
        {steps[step]}
      </div>
    </div>
  );
}

function NotificationBell({sid,onNav}){
  const [notifs,setNotifs]=useState([]);
  const [open,setOpen]=useState(false);
  const [lastSeen,setLastSeen]=useState(0);

  const load=async()=>{
    if(!sid)return;
    try{
      const keys=await DB.list("notif:"+sid+":");
      const items=await Promise.all(keys.map(k=>DB.get("notif:"+sid+":"+k)));
      const valid=items.filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0));
      setNotifs(valid);
    }catch(e){}
  };

  useEffect(()=>{
    load();
    const iv=setInterval(load,15000);
    return ()=>clearInterval(iv);
  },[sid]);

  const unseen=notifs.filter(n=>n.ts>(lastSeen||0)).length;

  const markSeen=()=>{setLastSeen(Date.now());setOpen(o=>!o);};

  const dismiss=async(n)=>{
    try{await DB.delete("notif:"+sid+":"+n.id,true);}catch(e){}
    setNotifs(p=>p.filter(x=>x.id!==n.id));
  };

  const dismissAll=async()=>{
    for(const n of notifs){try{await DB.delete("notif:"+sid+":"+n.id,true);}catch(e){}}
    setNotifs([]);setOpen(false);
  };

  const go=(n)=>{dismiss(n);setOpen(false);if(n.nav)onNav(n.nav);};

  const ICONS={friend:"👤",message:"✉️",comment:"💬",reply:"↩️"};

  return(
    <div style={{position:"relative"}}>
      <button onClick={markSeen} style={{position:"relative",background:"none",border:"1px solid rgba(255,255,255,.1)",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:15,flexShrink:0}}>
        🔔
        {unseen>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#ef4444",borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"'Cinzel',serif",fontWeight:700,lineHeight:1}}>{unseen>9?"9+":unseen}</span>}
      </button>
      {open&&<div style={{position:"fixed",inset:0,zIndex:299}} onClick={()=>setOpen(false)}/>}
      {open&&<div style={{position:"absolute",top:40,right:0,zIndex:300,width:300,background:"#0f1117",border:"1px solid rgba(255,255,255,.1)",borderRadius:6,boxShadow:"0 8px 32px rgba(0,0,0,.6)",overflow:"hidden"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px 10px",borderBottom:"1px solid rgba(255,255,255,.07)"}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:2,color:"rgba(237,232,223,.55)"}}>NOTIFICATIONS</span>
          {notifs.length>0&&<button onClick={dismissAll} style={{background:"none",border:"none",color:"rgba(237,232,223,.38)",cursor:"pointer",fontSize:10,fontFamily:"'Cinzel',serif",letterSpacing:1}}>Clear all</button>}
        </div>
        {notifs.length===0
          ?<div style={{padding:"24px 14px",textAlign:"center",color:"rgba(237,232,223,.38)",fontSize:12,fontStyle:"italic",fontFamily:"'Cormorant Garamond',serif"}}>All caught up ✦</div>
          :<div style={{maxHeight:340,overflowY:"auto"}}>
            {notifs.map(n=><div key={n.id} onClick={()=>go(n)} style={{display:"flex",gap:10,padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,.05)",cursor:"pointer",transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.04)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{ICONS[n.type]||"🔔"}</div>

                <div style={{fontSize:12,color:"rgba(237,232,223,.8)",lineHeight:1.5,marginBottom:3}}>{n.text}</div>

            </div>)}

    </div>
  );

  const removeFriend=async(fsid)=>{const updated=(friends||[]).filter(x=>x.sid!==fsid);await DB.set("friends:"+sid,updated);setFriends(updated);};
  const blockUser=async(bsid,bname)=>{const updated=[...(blocked||[]),{sid:bsid,name:bname}];await DB.set("blocked:"+sid,updated);setBlocked(updated);const mk2=await DB.list("dm:"+sid+":");const keys=(mk2||[]).filter(k=>k.startsWith(bsid));await Promise.all(keys.map(k=>DB.set("dm:"+sid+":"+k,null)));setInbox(p=>(p||[]).filter(m=>m.fromSid!==bsid));setToast("User blocked.");};
  const unblock=async(bsid)=>{const updated=(blocked||[]).filter(x=>x.sid!==bsid);await DB.set("blocked:"+sid,updated);setBlocked(updated);};
  const deleteSingleMsg=async(msg)=>{await DB.set("dm:"+sid+":"+msg.id,null);setInbox(p=>(p||[]).filter(m=>m.id!==msg.id));};
  const sendReply=async(msg)=>{if(!replyMsg.trim())return;const id=uid();const dm={id,fromSid:sid,fromName:user?.name||"Anonymous",toSid:msg.fromSid,body:replyMsg.trim(),ts:Date.now()};await DB.set("dm:"+msg.fromSid+":"+id,dm);await sendNotif(msg.fromSid,"message",(user?.name||"Someone")+" replied to your message","profile");setReplyMsg("");setReplyTo(null);setToast("Reply sent!");};
  const sendCompose=async()=>{if(!composeTo||!composeMsg.trim())return;const id=uid();const dm={id,fromSid:sid,fromName:user?.name||"Anonymous",toSid:composeTo.sid,body:composeMsg.trim(),ts:Date.now()};await DB.set("dm:"+composeTo.sid+":"+id,dm);await sendNotif(composeTo.sid,"message",(user?.name||"Someone")+" sent you a message","profile");setComposeMsg("");setComposeTo(null);setToast("Message sent to "+composeTo.name+"!");};

  useEffect(()=>{(async()=>{
    const keys=await DB.list("profile:");const all=await Promise.all((keys||[]).map(k=>DB.get("profile:"+k)));setAllSouls(all.filter(s=>s&&s.isPublic));
    /* inbox — messages sent to my sid */
    const mk=await DB.list("dm:"+sid+":");const mi=await Promise.all((mk||[]).map(k=>DB.get("dm:"+sid+":"+k)));setInbox(mi.filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0)));
    /* friends & blocked */
    const fr=await DB.get("friends:"+sid)||[];setFriends(fr);
    const bl=await DB.get("blocked:"+sid)||[];setBlocked(bl);
    /* groups */
    const gk=await DB.list("group:");const gi=await Promise.all((gk||[]).map(k=>DB.get("group:"+k)));setGroups(gi.filter(g=>g&&(g.members||[]).includes(sid)));
  })();},[tab]);

  const loadDmThread=async(targetSid)=>{
    setDmTarget(targetSid);
    const k1=await DB.list("dm:"+sid+":"+targetSid);
    const k2=await DB.list("dm:"+targetSid+":"+sid);
    const [m1,m2]=await Promise.all([
      Promise.all(k1.map(k=>DB.get("dm:"+sid+":"+targetSid+":"+k))),
      Promise.all(k2.map(k=>DB.get("dm:"+targetSid+":"+sid+":"+k)))
    ]);
    const all=[...m1,...m2].filter(Boolean).sort((a,b)=>(a.ts||0)-(b.ts||0));
    setDmThread(all);
  };
  const sendDm=async()=>{
    if(!dmMsg.trim()||!dmTarget)return;
    const id=uid();const msg={id,from:sid,fromName:user?.name||"Anonymous",to:dmTarget,body:dmMsg,ts:Date.now()};
    await DB.set("dm:"+sid+":"+dmTarget+":"+id,msg);
    setDmMsg("");setDmThread(p=>[...p,msg]);
  };
  const createGroup=async()=>{
    if(!newGrp.name)return;
    const id=uid();const g={id,name:newGrp.name,desc:newGrp.desc,members:[sid],creator:sid,creatorName:user?.name||"Anonymous",ts:Date.now()};
    await DB.set("group:"+id,g);setGroups(p=>[...p,g]);setNewGrp({name:"",desc:""});setToast("Group created!");
  };
  const addMemberToGroup=async(g,targetSid,targetName)=>{
    if((g.members||[]).includes(targetSid)){setToast("Already a member");return;}
    const updated={...g,members:[...(g.members||[]),targetSid],memberNames:{...(g.memberNames||{}),[targetSid]:targetName}};
    await DB.set("group:"+g.id,updated);
    setActiveGrp(updated);setGroups(p=>p.map(x=>x.id===g.id?updated:x));
    // notify the added member via DM
    const notifId=uid();await DB.set("dm:"+targetSid+":"+notifId,{id:notifId,fromSid:sid,fromName:user?.name||"Anonymous",toSid:targetSid,body:"You've been added to the group '"+g.name+"' 🎉",ts:Date.now()},true);
    setToast(targetName+" added to group!");
  };
  const joinGroup=async(g)=>{if((g.members||[]).includes(sid))return;const updated={...g,members:[...(g.members||[]),sid]};await DB.set("group:"+g.id,updated);setGroups(p=>p.map(x=>x.id===g.id?updated:x));};
  const loadGrpThread=async(g)=>{
    setActiveGrp(g);
    const k=await DB.list("grpmsg:"+g.id+":");
    const msgs=await Promise.all((k||[]).map(mk=>DB.get("grpmsg:"+g.id+":"+mk)));
    setGrpThread(msgs.filter(Boolean).sort((a,b)=>(a.ts||0)-(b.ts||0)));
  };
  const sendGrpMsg=async()=>{
    if(!grpMsg.trim()||!activeGrp)return;
    const id=uid();const msg={id,from:sid,fromName:user?.name||"Anonymous",body:grpMsg,ts:Date.now()};
    await DB.set("grpmsg:"+activeGrp.id+":"+id,msg);
    setGrpMsg("");setGrpThread(p=>[...p,msg]);
  };

  const TABS=[["profile","Soul Profile"],["friends","Friends"],["inbox","Inbox"],["groups","Groups"]];
  return (
    <div className="page">
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      <PageHead onBack={onBack} title="IDENTITY" sub="Soul Profile" tag="Know thyself" grad="radial-gradient(circle at 32% 26%,#fff8d4,#f0c060 22%,#c98436 46%,#3a1a06 90%,#150800 100%)" glow="rgba(201,163,86,.6)"/>
      <div style={{maxWidth:760,margin:"0 auto",padding:"0 18px 80px"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:22}}>{TABS.map(([k,l])=><button key={k} className={"tab"+(tab===k?" on":"")} onClick={()=>setTab(k)}>{l}</button>)}</div>

        {tab==="profile"&&<>
          {/* ── Profile Header Card ── */}
          <div className="glassg" style={{borderRadius:6,padding:28,marginBottom:22,textAlign:"center",border:"1px solid rgba(201,163,86,.18)"}}>
            <div style={{width:70,height:70,borderRadius:"50%",background:"linear-gradient(135deg,rgba(201,163,86,.25),rgba(201,163,86,.08))",border:"2px solid rgba(201,163,86,.4)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:28,color:"#C9A356",fontFamily:"'Cinzel',serif"}}>
              {(user?.name||"?").charAt(0).toUpperCase()}
            </div>
            <div className="fs" style={{fontSize:16,letterSpacing:3,color:"#EDE8DF",marginBottom:4}}>{user?.name||"Anonymous Soul"}</div>
            {user?.location&&<div style={{fontSize:12,color:"rgba(237,232,223,.5)",marginBottom:8}}>📍 {user.location}</div>}
            {user?.bio&&<div className="fi" style={{fontSize:13,color:"rgba(237,232,223,.6)",fontStyle:"italic",lineHeight:1.7,marginBottom:14,maxWidth:380,margin:"0 auto 14px"}}>{user.bio}</div>}
            <div style={{display:"flex",justifyContent:"center",gap:20,flexWrap:"wrap",marginBottom:14}}>
              {user?.createdAt&&<div style={{textAlign:"center"}}>
                <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(201,163,86,.6)",marginBottom:3}}>JOINED</div>
                <div style={{fontSize:12,color:"rgba(237,232,223,.7)"}}>{new Date(user.createdAt).toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
              </div>}
              {(user?.values||[]).length>0&&<div style={{textAlign:"center"}}>
                <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(201,163,86,.6)",marginBottom:3}}>VALUES</div>
                <div style={{fontSize:12,color:"rgba(237,232,223,.7)"}}>{(user.values||[]).length} chosen</div>
              </div>}
              {(user?.skills||[]).length>0&&<div style={{textAlign:"center"}}>
                <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(201,163,86,.6)",marginBottom:3}}>GIFTS</div>
                <div style={{fontSize:12,color:"rgba(237,232,223,.7)"}}>{(user.skills||[]).length} listed</div>
              </div>}
            </div>
            {(user?.values||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
              {(user.values||[]).slice(0,5).map(v=><span key={v} className="tg" style={{fontSize:9}}>{v}</span>)}
              {(user.values||[]).length>5&&<span className="tg" style={{fontSize:9}}>+{user.values.length-5} more</span>}
            </div>}
          </div>
          <div className="fs" style={{fontSize:9,letterSpacing:3,color:"rgba(201,163,86,.5)",marginBottom:14}}>EDIT YOUR PROFILE</div>
          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10,marginBottom:18}}>
            <span style={{fontSize:12,color:"rgba(237,232,223,.55)"}}>Public Profile</span>
            <div className={"toggle"+(f.isPublic?" on":"")} onClick={()=>up({isPublic:!f.isPublic})} style={{width:42,height:21,background:f.isPublic?"#059669":"rgba(255,255,255,.1)",borderRadius:11,cursor:"pointer",position:"relative",border:"1px solid rgba(255,255,255,.1)",transition:"background .3s"}}>
              <div style={{width:15,height:15,background:"#fff",borderRadius:"50%",position:"absolute",top:2,left:f.isPublic?25:2,transition:"left .3s"}}/>
            </div>
          </div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Soul Name</label><input value={f.name} onChange={e=>up({name:e.target.value})} placeholder="Your name in the civilization"/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Location</label><input value={f.location} onChange={e=>up({location:e.target.value})} placeholder="City, Country"/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Your Story</label><textarea value={f.bio} onChange={e=>up({bio:e.target.value})} rows={4} placeholder="Who are you? What are you building?"/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Core Values</label><Pills opts={VALUES} sel={f.values} onChange={v=>up({values:v})}/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Gifts & Skills</label><Pills opts={SKILLS} sel={f.skills} onChange={v=>up({skills:v})}/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:14}}><label className="lbl">Seeking</label><Pills opts={SEEKING} sel={f.seeking} onChange={v=>up({seeking:v})}/></div>
          <div className="glass" style={{borderRadius:4,padding:18,marginBottom:22}}><label className="lbl">Current Focus</label><Pills opts={FOCUS} sel={f.focus} onChange={v=>up({focus:v})}/></div>
          <button className="btn btng" style={{width:"100%",justifyContent:"center",padding:14,fontSize:10,marginBottom:14}} onClick={save}>Save Soul Profile</button>
          {/* Sovereignty support */}
          <div className="glass" style={{borderRadius:4,padding:22,textAlign:"center",border:"1px solid rgba(201,163,86,.2)"}}>
            <div className="fs" style={{fontSize:10,letterSpacing:2,color:"rgba(201,163,86,.8)",marginBottom:8}}>SOVEREIGNTY SUPPORT</div>
            <p className="fi" style={{fontSize:14,color:"rgba(237,232,223,.68)",fontStyle:"italic",marginBottom:16,lineHeight:1.65}}>Get support with becoming sovereign for yourself and your children — health, education, and legal sovereignty.</p>
            <a href="https://vedarevival.com?af=af698299c5e1012" target="_blank" rel="noreferrer" className="btn btng" style={{display:"inline-flex",textDecoration:"none",padding:"11px 28px",fontSize:10}}>Get Sovereignty Support</a>
          </div>
        </>}

        {tab==="inbox"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div className="fs" style={{fontSize:10,letterSpacing:3,color:"rgba(237,232,223,.48)"}}>Messages Received</div>
            {friends.length>0&&<button className="btn btng" style={{fontSize:9,padding:"6px 14px"}} onClick={()=>setComposeTo(friends[0])}>✉ New Message</button>}
          </div>
          {composeTo&&<div className="glassg" style={{borderRadius:4,padding:18,marginBottom:16,border:"1px solid rgba(201,163,86,.2)"}}>
            <div className="fs" style={{fontSize:10,letterSpacing:2,color:"rgba(201,163,86,.7)",marginBottom:10}}>NEW MESSAGE</div>
            <div style={{marginBottom:10}}>
              <label className="lbl">To</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
                {friends.map(f=><button key={f.sid} className={"pill"+(composeTo.sid===f.sid?" on":"")} onClick={()=>setComposeTo(f)}>{f.name}</button>)}
              </div>
            </div>
            <textarea value={composeMsg} onChange={e=>setComposeMsg(e.target.value)} rows={3} placeholder={"Write to "+composeTo.name+"..."} style={{marginBottom:8}}/>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btng" style={{fontSize:9,padding:"7px 16px"}} onClick={sendCompose} disabled={!composeMsg.trim()}>Send</button>
              <button className="btnh" style={{fontSize:9}} onClick={()=>{setComposeTo(null);setComposeMsg("");}}>Cancel</button>
            </div>
          </div>}
          {(inbox||[]).filter(m=>!blocked.find(b=>b.sid===m.fromSid)).length===0
            ?<div style={{textAlign:"center",padding:52}}><div className="fs" style={{fontSize:12,letterSpacing:2,color:"rgba(237,232,223,.38)"}}>No messages yet</div><p className="fi" style={{fontSize:14,color:"rgba(237,232,223,.38)",marginTop:8,fontStyle:"italic"}}>When someone sends you a message, it appears here</p></div>
            :<div style={{display:"flex",flexDirection:"column",gap:12}}>{(inbox||[]).filter(m=>!blocked.find(b=>b.sid===m.fromSid)).map(m=><div key={m.id} className="glass" style={{borderRadius:4,padding:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <span className="fs" style={{fontSize:10,letterSpacing:1,color:"rgba(201,163,86,.8)"}}>{m.fromName}</span>
                <span style={{fontSize:11,color:"rgba(237,232,223,.38)"}}>{m.ts?new Date(m.ts).toLocaleDateString():""}</span>
              </div>
              <div style={{fontSize:14,color:"rgba(237,232,223,.8)",lineHeight:1.6,marginBottom:12}}>{m.body}</div>
              {replyTo===m.id&&<div style={{marginBottom:10}}>
                <textarea value={replyMsg} onChange={e=>setReplyMsg(e.target.value)} rows={2} placeholder="Write a reply..." style={{marginBottom:8}}/>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btng" style={{fontSize:9,padding:"6px 14px"}} onClick={()=>sendReply(m)}>Send Reply</button>
                  <button className="btnh" style={{fontSize:9}} onClick={()=>{setReplyTo(null);setReplyMsg("");}}>Cancel</button>
                </div>
              </div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button className="btnh" style={{fontSize:9}} onClick={()=>{setReplyTo(m.id);setReplyMsg("");}}>↩ Reply</button>
                {!friends.find(f=>f.sid===m.fromSid)&&allSouls.find(s=>s.uid===m.fromSid)&&<button className="btnh" style={{fontSize:9}} onClick={()=>addFriend(allSouls.find(s=>s.uid===m.fromSid))}>+ Add Friend</button>}
                <button className="btnh" style={{fontSize:9}} onClick={()=>deleteSingleMsg(m)}>🗑 Delete</button>
                <button className="btnh" style={{fontSize:9,color:"rgba(239,68,68,.6)",borderColor:"rgba(239,68,68,.2)"}} onClick={()=>blockUser(m.fromSid,m.fromName)}>🚫 Block</button>
              </div>
            </div>)}
          </div>}
          {blocked.length>0&&<div style={{marginTop:24}}>
            <div className="fs" style={{fontSize:9,letterSpacing:2,color:"rgba(237,232,223,.38)",marginBottom:10}}>BLOCKED</div>
            {blocked.map(b=><div key={b.sid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"rgba(239,68,68,.05)",border:"1px solid rgba(239,68,68,.1)",borderRadius:3,marginBottom:6}}>
              <span style={{fontSize:12,color:"rgba(237,232,223,.55)"}}>{b.name}</span>
              <button className="btnh" style={{fontSize:9}} onClick={()=>unblock(b.sid)}>Unblock</button>
            </div>)}
          </div>}
        </div>}
        {tab==="friends"&&<div>
          <div className="fs" style={{fontSize:10,letterSpacing:3,color:"rgba(237,232,223,.48)",marginBottom:18}}>Your Connections</div>
          {friends.length===0
            ?<div style={{textAlign:"center",padding:52}}><div className="fs" style={{fontSize:12,letterSpacing:2,color:"rgba(237,232,223,.38)"}}>No friends yet</div><p className="fi" style={{fontSize:14,color:"rgba(237,232,223,.38)",marginTop:8,fontStyle:"italic"}}>Add friends from your inbox or the community directory</p></div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12,marginBottom:28}}>
              {friends.map(fr=><div key={fr.sid} className="glass" style={{borderRadius:4,padding:18,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:"rgba(201,163,86,.15)",border:"1px solid rgba(201,163,86,.3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:15,color:"#C9A356",fontFamily:"'Cinzel',serif"}}>{(fr.name||"?").charAt(0).toUpperCase()}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fr.name}</div>
                  <button className="btnh" style={{fontSize:9}} onClick={()=>{setDmRecip(fr.sid);setTab("groups");}}>Message</button>
                </div>
                <button onClick={()=>removeFriend(fr.sid)} style={{background:"none",border:"none",color:"rgba(237,232,223,.38)",cursor:"pointer",fontSize:16,padding:4}} title="Remove friend">×</button>
              </div>)}
            </div>
          }
          <div style={{marginTop:24,textAlign:"center"}}>
            <div className="fi" style={{fontSize:13,color:"rgba(237,232,223,.55)",fontStyle:"italic",marginBottom:14}}>Search the community to find souls by skill, value, or name</div>
            <button className="btn btng" style={{padding:"12px 28px",fontSize:10}} onClick={onGoToCommunity}>🔍 Find People in Community</button>
          </div>
        </div>}
        {tab==="groups"&&<div>
          {!activeGrp
            ?<div>
              <div className="fs" style={{fontSize:10,letterSpacing:3,color:"rgba(237,232,223,.48)",marginBottom:14}}>Your Groups</div>
              {groups.length>0&&<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:22}}>
                {(groups||[]).map(g=><button key={g.id} className="glass lift" style={{borderRadius:4,padding:18,textAlign:"left",cursor:"pointer",width:"100%"}} onClick={()=>loadGrpThread(g)}>
                  <div className="fs" style={{fontSize:11,letterSpacing:1,marginBottom:4}}>{g.name}</div>
                  {g.desc&&<div className="fi" style={{fontSize:13,color:"rgba(237,232,223,.55)",fontStyle:"italic"}}>{g.desc}</div>}
                  <div style={{fontSize:11,color:"rgba(237,232,223,.38)",marginTop:5}}>{(g.members||[]).length} members</div>
                </button>)}
              </div>}
              <div className="glassg" style={{borderRadius:4,padding:22,marginBottom:16}}>
                <div className="fs" style={{fontSize:10,letterSpacing:2,marginBottom:14,color:"rgba(201,163,86,.7)"}}>CREATE A GROUP</div>
                <div style={{marginBottom:10}}><label className="lbl">Group Name</label><input value={newGrp.name} onChange={e=>setNewGrp(p=>({...p,name:e.target.value}))} placeholder="e.g. Soul Sisters, My Study Circle"/></div>
                <div style={{marginBottom:14}}><label className="lbl">Description</label><input value={newGrp.desc} onChange={e=>setNewGrp(p=>({...p,desc:e.target.value}))} placeholder="What's this group about?"/></div>
                <button className="btn btng" style={{fontSize:10}} onClick={createGroup} disabled={!newGrp.name}>Create Group</button>
              </div>
            </div>
            :<div>
              <button className="btnh" style={{marginBottom:14,fontSize:10}} onClick={()=>setActiveGrp(null)}>← Back to groups</button>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div className="fs" style={{fontSize:12,letterSpacing:2}}>{activeGrp.name}</div>
                <div style={{fontSize:11,color:"rgba(237,232,223,.38)"}}>{(activeGrp.members||[]).length} members</div>
              </div>
              {activeGrp.desc&&<div className="fi" style={{fontSize:13,color:"rgba(237,232,223,.55)",fontStyle:"italic",marginBottom:10}}>{activeGrp.desc}</div>}
              {activeGrp.creator===sid&&<details style={{marginBottom:14}}>
                <summary style={{fontSize:10,letterSpacing:2,color:"rgba(201,163,86,.6)",fontFamily:"'Cinzel',serif",cursor:"pointer",marginBottom:8}}>+ ADD MEMBERS</summary>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>
                  {(allSouls||[]).filter(s=>s.uid!==sid&&!(activeGrp.members||[]).includes(s.uid)).length===0
                    ?<div style={{fontSize:12,color:"rgba(237,232,223,.38)",fontStyle:"italic"}}>Everyone in the community is already a member</div>
                    :(allSouls||[]).filter(s=>s.uid!==sid&&!(activeGrp.members||[]).includes(s.uid)).map(s=><div key={s.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"rgba(255,255,255,.03)",borderRadius:3,border:"1px solid rgba(255,255,255,.1)"}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:500}}>{s.name}</div>
                        {s.location&&<div style={{fontSize:10,color:"rgba(237,232,223,.48)"}}>📍 {s.location}</div>}
                      </div>
                      <button className="btn btng" style={{fontSize:9,padding:"5px 12px"}} onClick={()=>addMemberToGroup(activeGrp,s.uid,s.name)}>Add</button>
                    </div>)
                  }
                </div>
              </details>}

function BreathModal({pattern,onClose}){
  const [phase,setPhase]=useState("idle");
  const [count,setCount]=useState(0);
  const [round,setRound]=useState(0);
  const [done,setDone]=useState(false);
  const timerRef=useRef(null);
  const runPhases=useRef(null);

  const start=()=>{
    if(phase!=="idle"&&!done)return;
    setDone(false);setRound(0);setPhase("idle");
    let r=0,pi=0;
    const next=()=>{
      if(r>=pattern.rounds){setPhase("done");setDone(true);return;}
      const ph=pattern.phases[pi];
      setPhase(ph.type||ph.l.toLowerCase().includes("hold")?"hold":ph.l.toLowerCase().includes("exhale")||ph.l.toLowerCase().includes("out")?"out":"in");
      setCount(ph.s);
      let c=ph.s;
      const tick=setInterval(()=>{
        c--;
        setCount(c);
        if(c<=0){
          clearInterval(tick);
          pi=(pi+1)%pattern.phases.length;
          if(pi===0)r++;
          setRound(r+1);
          next();
        }
      },1000);
      timerRef.current=tick;
    };
    next();
  };

  useEffect(()=>()=>{if(timerRef.current)clearInterval(timerRef.current);},[]);

  const phaseColor={idle:"rgba(20,184,166,.07)",in:"rgba(20,184,166,.38)",hold:"rgba(201,163,86,.3)",out:"rgba(59,130,246,.28)",done:"rgba(52,211,153,.28)"};
  const phaseScale={idle:"1",in:"1.25",hold:"1.22",out:".82",done:"1"};
  const phaseName={idle:"Tap to Begin",in:"Breathe In",hold:"Hold",out:"Breathe Out",done:"Complete ✓"};
  const currentPhase=done?"done":phase;
  const pLabel=pattern.phases.find(p=>p.l.toLowerCase().includes("hold")&&currentPhase==="hold"?"hold":true)?.l||phaseName[currentPhase];

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",padding:18}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal r1" style={{maxWidth:400,width:"100%",textAlign:"center"}}>
        <div className="fs" style={{fontSize:13,letterSpacing:3,marginBottom:2,color:pattern.color}}>{pattern.name}</div>
        <div style={{fontSize:11,color:"rgba(237,232,223,.48)",marginBottom:22,fontStyle:"italic"}}>{pattern.desc}</div>
        <div onClick={start} style={{width:170,height:170,borderRadius:"50%",background:phaseColor[currentPhase],border:"2px solid "+(currentPhase==="idle"?"rgba(255,255,255,.12)":pattern.color+"88"),margin:"0 auto 20px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"all "+(phase==="in"?"4s":"2s")+" ease",transform:"scale("+phaseScale[currentPhase]+")",boxShadow:currentPhase!=="idle"?"0 0 48px "+pattern.color+"44":"none"}}>
          <div style={{fontSize:34,fontWeight:300,color:done?"#34d399":pattern.color,lineHeight:1}}>{count>0?count:""}</div>
          <div className="fi" style={{fontSize:12,color:"rgba(237,232,223,.68)",marginTop:4,fontStyle:"italic"}}>{phaseName[currentPhase]}</div>
        </div>
        <div style={{fontSize:11,color:"rgba(237,232,223,.48)",marginBottom:8}}>Round {Math.min(round,pattern.rounds)} of {pattern.rounds}</div>
        <div style={{display:"flex",justifyContent:"center",gap:5,marginBottom:18}}>
          {Array.from({length:pattern.rounds},(_,i)=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:i<round?"#2dd4bf":"rgba(255,255,255,.1)",transition:"background .5s"}}/>)}
        </div>
        <div style={{background:"rgba(255,255,255,.03)",borderRadius:3,padding:12,marginBottom:16,textAlign:"left"}}>
          <div style={{fontSize:10,letterSpacing:1,color:"rgba(237,232,223,.38)",marginBottom:5}}>THE SCIENCE</div>
          <p style={{fontSize:12,color:"rgba(237,232,223,.55)",lineHeight:1.55}}>{pattern.benefit}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          {done&&<button className="btn btng" style={{flex:1,justifyContent:"center",fontSize:10}} onClick={()=>{setDone(false);setRound(0);setPhase("idle");setCount(0);}}>Again</button>}
          <button className="btnh" style={{flex:1,justifyContent:"center",fontSize:10}} onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

"s1":{
consciousness:[
{title:"Who Am I?",type:"journal",xp:20,teach:`Have you ever looked in the mirror and wondered — who is THAT? That's you! But here's the magical thing... the real YOU is not just your body.

Your body is like a cozy home. And YOU — the real you — lives inside it. The real you is the part that thinks, feels, dreams, and loves. Some people call this your soul.

Here's something amazing: there has never EVER been anyone exactly like you. Not in all of history. Not anywhere in the whole world. Your laugh is yours. Your thoughts are yours. The way you see a rainbow or smell cookies baking — that's all uniquely, perfectly YOU.

You are one of a kind. The universe made you on purpose.`,prompt:"What are 3 things that make you YOU? What do you love? What makes you smile? What is something you're really good at?",},
{title:"Your Amazing Brain",type:"quiz",xp:20,teach:`Inside your head is the most amazing thing in the whole universe — your BRAIN!

Your brain is like a supercomputer, but WAY better than any computer ever made. It helps you think, remember, move, dream, and feel.

Here's something wild: when you learn something new, your brain actually GROWS. Tiny pathways connect inside your brain every time you practice something or learn something. The more you learn, the stronger your brain gets — just like muscles get stronger when you exercise!

This means you can always get better at things. If you find something hard today, keep trying! Your brain is literally growing every time you try.

Your brain works even while you sleep — it's busy organizing everything you learned that day and making memories. That's why sleep is SO important for kids!`,q:[{q:"What happens to your brain when you learn something new?",o:["It gets tired", "It grows new pathways", "It goes to sleep", "It gets smaller"],a:1},{q:"Your brain is like a really amazing what?",o:["Football", "Supercomputer", "Sandwich", "Rainbow"],a:1},{q:"What does your brain do while you sleep?",o:["Nothing at all", "Watches TV", "Organizes your memories", "Plays outside"],a:2},{q:"If something is hard for you, what should you do?",o:["Give up", "Cry forever", "Keep trying \u2014 your brain grows when you try!", "Ask someone else to do it"],a:2},],},
],
emotional:[
{title:"All Your Feelings Are OK",type:"journal",xp:20,teach:`Did you know you have feelings for a really good reason?

Feelings are like little messengers that live inside you. They're always trying to tell you something important!

When you feel HAPPY — your body is saying: something good is happening, enjoy it!
When you feel SAD — your body is saying: something matters to you and you need some extra love right now.
When you feel ANGRY — your body is saying: something doesn't feel fair.
When you feel SCARED — your body is saying: pay attention, something feels new or unsafe.
When you feel EXCITED — your body is saying: something wonderful might be coming!

Not one single feeling is bad or wrong. ALL feelings are allowed. The trick is knowing what to DO with a big feeling.

Here's a secret: when you NAME a feeling — when you say out loud 'I feel angry right now' — it actually helps that feeling get smaller. Scientists have proven this! Just putting a word on a feeling helps your brain calm down.`,prompt:"Think of a big feeling you had this week. What was it? What do you think it was trying to tell you?",},
{title:"The Magic of Breathing",type:"breath",xp:25,teach:`Here is a superpower you have RIGHT NOW that you can use any time, for free, forever.

It's your BREATH.

When something upsets you — when you're mad or scared or overwhelmed — your body goes into alarm mode. Your heart beats fast. Your muscles get tight. It feels really big and uncomfortable.

But here's the magic: when you take slow, deep breaths, you send a message directly to your brain that says: YOU ARE SAFE. CALM DOWN.

Your breathing is like a remote control for how you feel inside.

Big, brave people use this trick too. Firefighters use it. Astronauts use it. Athletes use it before a big game. And now YOU know it too!

Let's practice together. We're going to breathe in for 4 counts, hold for 4, breathe out for 4, and hold for 4. This is called Box Breathing and it works every single time.`,phases:[{l:"Breathe In",s:4},{l:"Hold",s:4},{l:"Breathe Out",s:4},{l:"Hold",s:4}],rounds:4,},
],
frequency:[
{title:"Your Heart Has a Special Power",type:"journal",xp:20,teach:`Put your hand on your heart right now. Feel that? Thump thump thump. That's your heart beating — just for YOU, all day and all night, without you ever having to ask it to.

Scientists discovered something really magical about your heart. When you feel love, kindness, or gratitude — your heart sends out a special invisible energy. It's called an electromagnetic field, and it reaches all the way out to the people around you!

That means when you are feeling happy and loving, the people near you can actually FEEL it — even if you don't say a word.

Have you ever walked into a room and felt that someone was grumpy — even before they said anything? Or felt warm and safe around a person who was kind and calm? That's real! You are feeling their heart's energy.

This is why how you FEEL matters — not just for you, but for everyone around you. You are always broadcasting something. Choose to broadcast love.

Fun fact: Scientists found that your heart is actually 5,000 times more powerful than your brain when it comes to this invisible energy!`,prompt:"Who is someone whose energy makes you feel warm and safe? What do you think they are feeling inside when you're around them?",},
],
spiritual:[
{title:"Everything Is Connected",type:"journal",xp:20,teach:`Here's one of the most beautiful secrets in the whole world: everything is connected.

Look at a tree. That tree breathes OUT what you breathe IN. And you breathe out what the tree breathes in. You and the tree are breathing partners! Without trees, there would be no air for you. Without you (and all animals), trees wouldn't have what they need either. You need each other.

Look at the food on your plate. The sun shone on a plant. The plant grew. Maybe an animal ate the plant. And now that energy — sunshine energy! — is inside your body giving you power to run and think and laugh.

You are made of sunshine.

And here's the most amazing part: every atom in your body was once part of a star. A real star, way out in space, billions of years ago. That star exploded and its pieces eventually became YOU.

You are not separate from the universe. You are MADE of the universe. You belong here. You are part of everything.`,prompt:"Look around you right now. Can you find one thing that is connected to something else? Write or think about how everything around you is connected.",},
],
creative:[
{title:"You Are a Creator",type:"journal",xp:20,teach:`Every single human being is creative. That means YOU.

Creativity just means making something that wasn't there before. When you build something with blocks — that's creativity. When you tell a story you made up — that's creativity. When you figure out a new way to do something — that's creativity. When you make someone laugh — that's creativity!

When you were a tiny baby, you were a creativity genius. All little children are. Scientists tested thousands of little kids and found that almost ALL of them were creative geniuses.

As we grow up, some people start to think there's only ONE right answer to everything — and that makes the creative part of us go quiet. But it never goes away. It's always there, waiting for you to use it.

Here's how to keep your creativity strong:
✨ Play pretend
✨ Ask 'what if' questions
✨ Try things in new ways
✨ Make mistakes on purpose sometimes
✨ Never stop asking WHY

The world needs your unique creativity. Nobody else will ever create the exact things you will create.`,prompt:"Invent something right now \u2014 it can be silly, magical, or impossible! What would you make? What would it do? What would you call it?",},
],
earth:[
{title:"The Earth Is Alive",type:"journal",xp:20,teach:`The Earth is not just a big rock floating in space. The Earth is ALIVE.

Just like your body has lungs to breathe, the Earth has forests — they're called the lungs of the Earth. Forests breathe in the bad air (carbon dioxide) and breathe out the good air (oxygen) that you need to live.

Just like your body has blood moving through it, the Earth has rivers and oceans moving water all around.

Just like your body knows how to heal a cut, the Earth knows how to heal itself too — when we let it.

Did you know there are more tiny living creatures in ONE handful of healthy soil than there are people on the entire Earth? The ground beneath your feet is FULL of life, even though you can't see it!

And trees in a forest actually talk to each other! They share food through tiny threads underground, like a secret underground internet. Big trees help little trees grow by sending them food through the roots.

The Earth is like one giant living family — and we are part of it.`,prompt:"Go outside or look out a window. Find something alive \u2014 a plant, a bug, a tree, the sky. Spend one whole minute just looking at it carefully. What did you notice that you never noticed before?",},
{title:"Water Is Magic",type:"quiz",xp:20,teach:`Water is the most magical thing on Earth — and it's inside you right now!

Your body is about 60% water. That means if you weigh 60 pounds, about 36 pounds of that is WATER. Your brain is even more water — about 75%! When you don't drink enough water, your brain gets foggy and it's hard to think clearly. That's why drinking water actually helps you think better!

Here's the coolest thing about water: the water on Earth is the SAME water that has always been here. It goes round and round in a circle called the water cycle. Water from the ocean evaporates (turns into tiny invisible drops), floats up into the sky, becomes clouds, falls as rain, flows into rivers, soaks into the ground, and eventually goes back to the ocean — over and over and over again.

The water you drink today might have once been in a river in ancient Egypt thousands of years ago! It might have been rained on dinosaurs! The same water has been cycling around our planet for billions of years.

Water is a treasure. Only a tiny amount of all the water on Earth is fresh clean water that people and animals can drink. We need to take care of every drop.`,q:[{q:"How much of your body is water?",o:["10%", "30%", "60%", "90%"],a:2},{q:"What happens to your thinking when you don't drink enough water?",o:["You think faster", "Your brain gets foggy", "Nothing changes", "You get stronger"],a:1},{q:"What is the water cycle?",o:["Water going in circles forever \u2014 ocean to sky to rain to rivers and back", "Water that goes in a bucket", "Rain only", "Water in a pond"],a:0},{q:"Why should we take care of water?",o:["Because it's pretty", "Because only a tiny amount of Earth's water is fresh clean water we can drink", "Because fish live in it", "Because it's cold"],a:1},],},
],
practical:[
{title:"Where Does Food Come From?",type:"journal",xp:20,teach:`Here's a question: where does your food come from?

Most people say 'the store.' But let's go back even further!

Before the store, food grows on FARMS. Farmers plant tiny seeds in soil. The sun shines on them. Rain waters them. And slowly — magically — a tiny seed becomes a tomato plant, or a corn stalk, or a strawberry!

Before the farm — it was a SEED. One single tiny seed can grow into a plant that makes hundreds of fruits or vegetables. That's one of the most amazing things in nature.

And where does the energy in food come from? THE SUN! Plants catch sunlight and turn it into food through a process called photosynthesis. Then you eat the plant, and that sun energy goes into YOUR body and gives you the power to run, think, and play.

You are literally powered by sunshine!

One of the coolest things you can ever do is grow your own food. Even a tiny seed planted in a cup of dirt on a windowsill is a miracle. You can watch something go from nothing to FOOD. And it tastes even more amazing when YOU grew it.`,prompt:"If you could grow any food, what would you grow? What do you think it would need to grow? Sunlight? Water? Soil? What would you do with it when it grew?",},
{title:"What Is Money?",type:"journal",xp:20,teach:`Have you ever wondered what money actually IS?

Money is not magic — it's a TOOL. It's something people invented a long time ago to make trading easier.

A long time ago, before money, people would TRADE things. If I have apples and you have eggs, we swap! That's called barter. And guess what — people still do this today!

The problem with just trading is: what if you have apples but the person who has eggs doesn't WANT apples? Then you're stuck! So people invented money — something everyone agrees has value, so anyone can trade with anyone.

Here's the important thing about money: it's not the most important thing in the world. Your health, your family, your kindness, your creativity — those are worth more than any amount of money.

But money IS a useful tool. And the most important thing to know about money right now is: SAVING is a superpower. If you get a little money and you save some of it instead of spending it all — it adds up over time into something bigger.

Some people also trade skills and things instead of money — and that's a beautiful way to live too!`,prompt:"Have you ever traded something with a friend \u2014 a toy, a snack, something? What happened? How did it feel? If you could trade something you have for something you want, what would it be?",},
],
math:[
{title:"Numbers Are Everywhere!",type:"quiz",xp:20,teach:`Numbers are not just in math class — they are EVERYWHERE!

How many steps to your bedroom? That's a number. How many apples in the bowl? Number. How old are you? Number. How many fingers do you have? Number!

Numbers help us COUNT things, MEASURE things, SHARE things, and understand the world around us.

Adding means putting things together. If you have 3 apples and your friend gives you 2 more — you put them together and now you have 5. 3 + 2 = 5!

Subtracting means taking things away. If you have 5 cookies and you eat 2 — now you have 3 left. 5 - 2 = 3!

Here's something cool: numbers follow patterns! Can you see the pattern? 2, 4, 6, 8... each number goes up by 2. Or 10, 20, 30, 40 — each goes up by 10. Patterns are everywhere in math, and finding them is like solving a fun puzzle.

The ancient Egyptians used numbers over 5,000 years ago to build the pyramids and keep track of food. Numbers have been helping humans ever since!`,q:[{q:"You have 4 oranges and get 3 more. How many do you have?",o:["5", "6", "7", "8"],a:2},{q:"You have 8 grapes and eat 3. How many are left?",o:["4", "5", "6", "7"],a:1},{q:"What comes next? 2, 4, 6, 8, ___",o:["9", "10", "11", "12"],a:1},{q:"You want to share 6 strawberries equally with your friend. How many each?",o:["2", "3", "4", "5"],a:1},],},
{title:"Shapes Are Everywhere!",type:"quiz",xp:20,teach:`Look around you right now. Everything you see is made of SHAPES!

A door is a rectangle — two long sides and two short sides.
The sun looks like a circle — perfectly round with no corners.
A slice of pizza is a triangle — three sides and three pointy corners.
A window might be a square — four equal sides, all the same length.

Shapes are not just in math books — they're in nature too! Beehives are made of hexagons (6 sides) because hexagons fit together perfectly with no gaps — smart bees!

Snowflakes are always 6-sided — every single one. No two snowflakes are exactly alike, but they all have 6 sides. Isn't that incredible?

Flowers often have patterns in their petals: 3 petals, 5 petals, 8 petals, 13 petals. These are special numbers that show up everywhere in nature. They're called Fibonacci numbers and they're like nature's favorite counting pattern.

Math is not just something humans invented — it's something the universe already uses everywhere!`,q:[{q:"How many sides does a triangle have?",o:["2", "3", "4", "6"],a:1},{q:"A square has 4 sides. What's special about them?",o:["They're all different colors", "They're all the same length", "Two are long and two are short", "They're all curved"],a:1},{q:"Why do bees use hexagons for their honeycomb?",o:["They're pretty", "Hexagons fit together perfectly with no gaps", "Bees like the number 6", "It's easier to draw"],a:1},{q:"How many sides does every snowflake always have?",o:["4", "5", "6", "8"],a:2},],},
],
literacy:[
{title:"Words Are Magic",type:"journal",xp:20,teach:`Here's something magical about words: someone who lived thousands of years ago wrote something down — and TODAY, you can read exactly what they thought. Words travel through time!

Every letter makes a sound. Every word is like a picture in your mind. When you read the word RAINBOW — did a rainbow appear in your head? That's the magic of words!

The more words you know, the bigger your world becomes. If you only know the word 'happy,' you feel happiness one way. But if you also know 'joyful,' 'delighted,' 'excited,' 'grateful,' 'peaceful' — suddenly happiness has so many beautiful flavors!

Writing is magic too. When you write something down, you make it MORE real. Your dreams, your ideas, your feelings — they float around inside you. But when you write them down, they become something you can hold, look at, share, and remember.

Every great storyteller, every great inventor, every great leader — they all used words to share their ideas with the world. Words are how humans pass their most important thoughts to each other across time and space.

You are learning one of the most powerful tools in the history of humans.`,prompt:"Write a tiny story \u2014 just 3 or 4 sentences \u2014 about something magical happening to an ordinary object, like a shoe or a spoon or a tree.",},
{title:"Stories Have Always Been Our Teachers",type:"journal",xp:20,teach:`Long before there were books, long before there were schools, long before there was even writing — people told STORIES.

Around fires at night, under stars, in caves — families and communities would tell stories to remember important things, to teach their children how to live, and to feel connected to each other.

Every single culture that has ever existed on Earth — in Africa, Asia, the Americas, Europe, the Pacific Islands — all of them told stories. Stories are something every human has always done. It's one of the things that makes us human!

And here's something scientists discovered: when someone tells a story and you listen to it — your brain actually starts to SYNC UP with the storyteller's brain. Your brain waves match. Stories literally connect human minds to each other.

That's why a good story can make you cry, or laugh, or feel brave — even if it's about made-up people. Your brain experiences the story almost like it's happening to YOU.

Every story you love, every story you tell, every story you create — it connects you to every human who has ever lived and shared a story around a fire.`,prompt:"What is your favorite story \u2014 a book, a movie, something someone told you? What do you think it was trying to teach you?",},
],
science:[
{title:"Everything Is Made of Tiny Things",type:"quiz",xp:20,teach:`Here is one of the most mind-blowing things in all of science: everything you can see and touch is made of tiny, tiny, TINY things called ATOMS.

Atoms are so small that millions of them could fit on the period at the end of this sentence. Your body has more atoms in it than there are grains of sand on every beach on Earth!

Atoms join together to make everything — water, air, your skin, a rock, a cloud, a cookie, YOU. Different combinations of atoms make different things.

Here's the really amazing part: the atoms in your body are incredibly old. The atoms that make up YOU were once inside stars that exploded billions of years ago, before the Earth even existed. Those star atoms eventually became part of our planet, then part of plants, then animals — and now they're part of YOU.

You are made of ancient stardust. Literally.

And here's one more amazing thing: atoms are almost entirely empty space! If an atom were as big as a stadium, the center would be the size of a marble, and the rest would be empty. So you — and everything around you — is mostly empty space held together by invisible forces. Incredible!`,q:[{q:"What are atoms?",o:["Tiny animals", "The tiny building blocks everything is made of", "A type of food", "Raindrops"],a:1},{q:"Where did the atoms in your body originally come from?",o:["The store", "They were made when you were born", "Ancient stars that exploded long ago", "The ground"],a:2},{q:"How small are atoms?",o:["As small as a grain of sand", "Millions could fit on a tiny dot", "As small as a raindrop", "As small as a hair"],a:1},{q:"What is most of an atom made of?",o:["Hard solid matter", "Water", "Empty space", "Light"],a:2},],},
{title:"Plants Are Amazing!",type:"journal",xp:20,teach:`Plants are some of the most amazing living things on Earth — and most people don't even notice how incredible they are!

Plants MAKE FOOD FROM SUNSHINE. Using sunlight, water, and air, plants create their own food through a process called photosynthesis. No plant has ever needed to go to a grocery store! They literally eat sunlight.

And when they do this — they breathe out oxygen. The oxygen YOU need to breathe right now came from plants! You breathe out carbon dioxide, and plants breathe that in. You are in a constant breathing partnership with every plant on Earth.

Plants can also FEEL things. They grow toward light. Their roots grow toward water. Some plants even close their leaves when you touch them!

And scientists discovered that trees in a forest TALK to each other through underground networks made of tiny fungi (like invisible threads connecting their roots). They share food with sick trees and baby trees. A big old tree can be feeding dozens of younger trees around it through these underground networks. Forests are actually communities — just underground and invisible!

The oldest living tree on Earth is over 4,800 years old. It was alive before the ancient Egyptian pyramids were built.`,prompt:"Find a plant near you \u2014 inside or outside. Look at it really carefully for one full minute. What do you notice about it? How does it make you feel to know it's making the air you breathe?",},
],
health:[
{title:"Your Body Is Amazing!",type:"quiz",xp:20,teach:`Your body is the most incredible home you will ever live in — and it does SO many amazing things without you ever having to ask!

Your HEART beats about 100,000 times every single day. That's over 35 million times a year — just for you, while you sleep, while you play, while you eat, all day every day.

Your BLOOD travels through your body so fast that it makes a full trip through your entire body in just about 20 seconds!

You have about 206 BONES. They protect your organs, help you move, and make new blood cells inside the soft middle part called bone marrow.

Your body HEALS ITSELF. When you get a cut, your body immediately starts fixing it — sending special cells to clean out germs and build new skin. You didn't have to do anything — your body just knew what to do!

And you have a SECOND BRAIN — did you know that? Your gut (your stomach and intestines) has millions of nerve cells and makes chemicals that affect how you feel happy or sad. That's why when you're nervous, you feel butterflies in your tummy. Your gut and your brain are always talking to each other!

Taking care of your body — sleeping well, eating good food, drinking water, moving and playing — is the most important thing you can do for yourself.`,q:[{q:"How many times does your heart beat every day?",o:["1,000", "10,000", "100,000", "1,000,000"],a:2},{q:"How long does it take blood to travel all the way through your body?",o:["1 hour", "20 seconds", "5 minutes", "All day"],a:1},{q:"What is your 'second brain'?",o:["Your heart", "Your hands", "Your gut \u2014 your stomach and intestines", "Your eyes"],a:2},{q:"What does your body do when you get a cut?",o:["Nothing, you have to fix it", "It heals itself automatically", "It asks you for help", "It stops working"],a:1},],},
{title:"Food Gives You Energy!",type:"journal",xp:20,teach:`Everything you eat becomes part of you. Seriously — the food you eat today will become part of your bones, your muscles, your brain, and your blood!

Different foods give your body different things it needs:

🍎 FRUITS AND VEGETABLES give you vitamins and minerals — these are like tiny tools your body uses to build things, fight germs, and keep everything working. The more colorful your plate, the better! Each color gives you something different.

🥚 PROTEINS (eggs, beans, nuts, meat) give your body the building blocks it needs to make muscles, repair itself, and grow.

🌾 WHOLE GRAINS (oats, brown rice, whole wheat) give you steady energy that lasts a long time — like slow-burning fuel.

💧 WATER is in almost every process your body does. Thinking, digesting, moving — all of it needs water.

Here's something cool: the foods that grow from the earth — fruits, vegetables, nuts, seeds — have been feeding humans for our entire history. Your body knows exactly what to do with real food from nature.

Eating is one of the most important things you do every day. You are literally building your body with every bite!`,prompt:"What are your favorite healthy foods? What color is your favorite vegetable or fruit? Next time you eat something, think about what part of your body it might be helping!",},
],
history:[
{title:"Ancient People Were Amazing",type:"quiz",xp:20,teach:`A long, long time ago — before phones, before cars, before electricity — people lived differently than we do now. But they were just as smart as people today, and they built incredible things!

The ancient EGYPTIANS built the Great Pyramids over 4,500 years ago. The biggest pyramid — the Great Pyramid — used over 2 million stone blocks, some weighing as much as an elephant! And it was built SO carefully that the four corners point almost exactly to North, South, East, and West. Scientists still marvel at how they did it!

The ancient MAYA people in Central America were incredible mathematicians and astronomers (people who study stars). They made a calendar SO accurate that it was better than the calendar Europe was using 1,000 years later!

In ancient INDIA, cities were built with running water and sewage systems — things most of Europe didn't have for thousands more years.

In AFRICA, the city of Timbuktu had one of the world's greatest universities over 600 years ago, with tens of thousands of students studying math, science, medicine, and literature.

Ancient people all over the world — in every continent — were building, learning, creating, and discovering. Humans have always been curious and incredible!`,q:[{q:"How old are the Egyptian pyramids?",o:["500 years old", "1,000 years old", "Over 4,500 years old", "100 years old"],a:2},{q:"What did the ancient Maya study so carefully that they made an amazing calendar?",o:["Animals", "Plants", "Stars and the sky", "Rivers"],a:2},{q:"What amazing thing did ancient Indian cities have that most places didn't for thousands of years?",o:["Electricity", "Running water and sewage systems", "Cars", "Computers"],a:1},{q:"Where was the great university city of Timbuktu?",o:["Europe", "Asia", "South America", "Africa"],a:3},],},
{title:"People Have Always Worked Together",type:"journal",xp:20,teach:`Here's something important that a lot of history books forget to mention: for most of human history, people mostly COOPERATED with each other. They helped each other. They shared. They worked together.

Humans lived in communities — groups where everyone helped. Some people hunted, some gathered plants, some cared for children, some made tools. Everyone had a role. Everyone mattered. The community shared what they had.

Native peoples around the world developed incredible knowledge over thousands of years — about plants and medicines, about weather, about how to live in harmony with nature. This knowledge helped them survive and thrive for thousands and thousands of years.

Women throughout history were leaders, healers, farmers, builders, artists, and teachers. Many of their contributions were forgotten or not written down — but they were always there, always contributing.

Children throughout history played important roles in their families and communities. They learned by doing, by watching, by helping. School as we know it is actually a very new invention!

When we learn about history, it's important to remember: history was made by EVERYONE — not just kings and warriors. It was made by families, communities, and ordinary people doing extraordinary things together.`,prompt:"What do you think you would have contributed if you lived in an ancient community 10,000 years ago? What skill or gift do you have that would have helped your community?",},
],

consciousness:[
{title:"The Watcher — Understanding Your Own Mind",type:"journal",xp:28,teach:`There is something remarkable you can discover through quiet observation: you can watch your own thoughts. You can notice a thought arise, observe it, and watch it pass — like clouds moving across a sky. This means you are not your thoughts. You are the one watching them.

This distinction — between thoughts and the awareness that observes them — is one of the most important insights in all of human wisdom, and it is now being confirmed by neuroscience.

Your brain produces approximately 60,000-80,000 thoughts per day. Research suggests that about 80% of these thoughts are negative and about 95% are the same thoughts you had yesterday. This means most people are running on a kind of automatic mental loop — the same worries, the same self-criticism, the same patterns — without realizing it.

When you become the observer of your thoughts rather than the victim of them, you gain a space between the thought and your reaction. Viktor Frankl — a psychiatrist who survived Nazi concentration camps — wrote: "Between stimulus and response there is a space. In that space is our power to choose our response. In our response lies our growth and our freedom."

The practice of observing your thoughts is called mindfulness or metacognition — thinking about your thinking. Studies show that people who practice this show measurably less activation in the amygdala (the brain's alarm center), greater emotional regulation, better decision-making, and higher levels of compassion.

Cognitive behavioral therapy — one of the most effective psychological treatments ever developed — is built entirely on this principle: your thoughts are not facts. A thought like "I am bad at this" is not a truth — it is just a thought. And thoughts can be questioned, reframed, and changed.`,
prompt:"Sit quietly for 3 minutes and just observe your thoughts. Don't judge them or try to stop them — just notice what comes up. Afterward, write: what kinds of thoughts appeared? Were any of them the same thought in different forms?"},
{title:"Cognitive Biases — The Glitches in Human Thinking",type:"quiz",xp:30,teach:`Your brain is a prediction machine — constantly making rapid judgments about what is happening and what to expect. Most of the time this is efficient and useful. But the shortcuts your brain uses — called heuristics — also produce systematic errors in thinking called cognitive biases.

Understanding cognitive biases is one of the most practical thinking skills you can develop. Here are the most important ones:

CONFIRMATION BIAS: The tendency to seek out, notice, and remember information that confirms what you already believe while ignoring information that contradicts it. This is why two people can read the same news and walk away with opposite conclusions. Actively seeking information that challenges your views is the antidote.

DUNNING-KRUGER EFFECT: People with limited knowledge in a domain tend to overestimate their competence, while genuine experts often underestimate theirs. This is why beginners are often supremely confident and experts are often full of doubt. The more you learn about something, the more you realize how much you don't know.

AVAILABILITY HEURISTIC: We judge the probability of events by how easily examples come to mind. People overestimate the danger of plane crashes (dramatic, memorable) and underestimate the danger of driving (boring, familiar) — even though cars are far more dangerous.

ANCHORING BIAS: The first piece of information you receive about something disproportionately influences all subsequent judgments. This is why stores put items "on sale" from a high original price — the anchor makes the sale price seem like a bargain.

SURVIVORSHIP BIAS: We study successful people and successful companies to learn what made them succeed — but we ignore all the people who did the exact same things and failed. This leads to false lessons about what actually drives success.

SUNK COST FALLACY: Continuing to invest time, money, or effort in something because of what you've already put in — even when it makes no rational sense to continue. "I've already watched an hour of this bad movie, I might as well finish it."`,
q:[{q:"What is confirmation bias?",o:["Confirming your identity","Seeking information that supports what you already believe and ignoring what contradicts it","Being confident in your decisions","A type of logical proof"],a:1},{q:"What is the Dunning-Kruger effect?",o:["An illness","When experts think they know everything","When beginners overestimate their competence while experts underestimate theirs","A type of bias toward experts"],a:2},{q:"What is the sunk cost fallacy?",o:["Spending too much money","Continuing to invest in something because of what you already put in, even when irrational","A type of savings","Losing money in the stock market"],a:1},{q:"Why do people overestimate plane crash danger vs car crash danger?",o:["Planes are actually more dangerous","Because of availability heuristic — plane crashes are dramatic and memorable","Because of confirmation bias","It's random"],a:1}]},

emotional:[
{title:"Attachment Theory — Why You Relate the Way You Do",type:"journal",xp:28,teach:`One of the most important discoveries in developmental psychology is attachment theory, developed by John Bowlby and Mary Ainsworth. It explains that the relationship patterns you form with caregivers in early childhood create internal templates that influence how you relate to people for the rest of your life.

SECURE ATTACHMENT develops when a caregiver is consistently available, responsive, and comforting. Children with secure attachment feel safe exploring the world, knowing they have a reliable base to return to. As adults, they tend to be comfortable with intimacy, communicate well in relationships, and recover more quickly from stress.

ANXIOUS ATTACHMENT develops when a caregiver is inconsistently available — loving sometimes and unavailable other times. The child never knows what to expect, so they become hypervigilant about the relationship. As adults, they may become clingy, worry excessively about rejection, and need constant reassurance.

AVOIDANT ATTACHMENT develops when a caregiver is consistently emotionally unavailable or dismissive. The child learns to suppress their emotional needs and become self-sufficient. As adults, they may be uncomfortable with closeness, struggle to ask for help, and find deep intimacy threatening.

DISORGANIZED ATTACHMENT develops from frightening or abusive caregiving — the person who is supposed to be the source of safety is also the source of danger. This creates deep confusion about relationships.

The crucial insight: these are PATTERNS, not permanent traits. Understanding your attachment style is the first step to consciously evolving it. Secure attachment can be developed at any age through therapy, self-awareness, and healthy relationships. Your early experiences shaped you — but they do not define you.`,
prompt:"Without judgment, reflect on how you tend to behave in close relationships when you feel stressed or insecure. Do you seek more closeness, pull away, or something else? What patterns can you observe?"},
{title:"Breathwork — Advanced Techniques",type:"breath",xp:28,teach:`You have already learned box breathing. Now understand the deeper science of what happens in your body and brain during breathwork.

The vagus nerve is the 10th cranial nerve and the longest nerve in your body — running from your brainstem through your neck, chest, and abdomen, touching your heart, lungs, and digestive organs along the way. It is the primary pathway of the parasympathetic nervous system — your rest and digest system.

Vagal tone refers to how active and responsive your vagus nerve is. High vagal tone is associated with better emotional regulation, lower inflammation, better immune function, more resilience to stress, and stronger social connections. Studies link high vagal tone to better cardiovascular health and longer life.

Slow, deep breathing — especially with a longer exhale than inhale — is one of the most direct ways to increase vagal tone. Every slow exhale activates the vagus nerve, sending a signal of safety throughout your entire body.

Research by Dr. Andrew Huberman at Stanford identified a technique he calls the "physiological sigh" as the fastest known way to reduce stress: a double inhale through the nose (sniff twice) followed by a long, slow exhale through the mouth. This double inhale fully inflates the lungs, maximizing the oxygen-CO2 exchange, and the long exhale maximally activates the vagus nerve. Doing this just once or twice can measurably lower heart rate and reduce stress within seconds.

The extended exhale technique (4 count in, 8 count out) activates the parasympathetic system even more powerfully than box breathing. This is sometimes called coherent breathing or resonance breathing.`,
phases:[{l:"Inhale",s:4},{l:"Hold",s:2},{l:"Exhale",s:8},{l:"Rest",s:2}],rounds:5},
{title:"Emotional Intelligence — The Skills That Actually Matter",type:"quiz",xp:26,teach:`Psychologist Daniel Goleman's research found that IQ and technical skills matter far less for life success than emotional intelligence — the ability to understand and manage your own emotions and understand and respond skillfully to the emotions of others.

He identified five domains of emotional intelligence:

SELF-AWARENESS: Knowing what you're feeling and why. Most people are surprisingly unaware of their emotional states in real time. The ability to accurately label your emotions — not just "bad" but specifically "I feel frustrated because I feel unheard" — is itself a regulation skill. Research shows that labeling an emotion activates the prefrontal cortex and reduces amygdala activity.

SELF-REGULATION: Managing your emotional reactions so they don't control your behavior. This is not suppressing emotions — it is developing the pause between feeling and acting, so you can respond rather than react. The prefrontal cortex, responsible for rational thought, temporarily goes offline during intense emotional activation — this is why people say and do things they regret when overwhelmed.

MOTIVATION: Persisting toward goals despite setbacks. Emotionally intelligent people tend to have intrinsic motivation — they do things because they find them meaningful, not primarily for external rewards.

EMPATHY: Accurately sensing what others are feeling. Mirror neurons in your brain fire both when you perform an action AND when you observe someone else performing it — this is the neurological basis of empathy. You literally simulate others' experiences in your own brain.

SOCIAL SKILLS: Building and maintaining relationships, reading social dynamics, communicating clearly, managing conflict constructively.

Long-term studies have found that emotional intelligence predicts career success, relationship quality, physical health, and life satisfaction better than IQ in almost every domain.`,
q:[{q:"What did Daniel Goleman's research find about emotional intelligence vs IQ?",o:["IQ matters more for success","They are equally important","Emotional intelligence predicts success better than IQ in most domains","Neither matters"],a:2},{q:"What happens to your prefrontal cortex during intense emotional activation?",o:["It works harder","It temporarily goes offline","It grows larger","Nothing changes"],a:1},{q:"What are mirror neurons?",o:["Neurons that reflect light","Neurons that fire both when you act and when you observe others acting — the basis of empathy","Neurons in your eyes","Copies of other neurons"],a:1},{q:"What is the difference between self-awareness and self-regulation?",o:["They're the same thing","Awareness is knowing what you feel; regulation is managing how you respond to it","Regulation comes before awareness","Only adults have self-regulation"],a:1}]},
