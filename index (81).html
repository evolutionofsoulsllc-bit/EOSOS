consciousness:[
{title:"Sovereignty of Mind — Epistemology and Knowing What is True",type:"journal",xp:62,teach:`Epistemology is the branch of philosophy concerned with the nature, sources, and limits of knowledge. How do you know what you know? How do you distinguish well-founded beliefs from poorly-founded ones? How do you protect your mind from manipulation and misinformation? These are not abstract academic questions — they are among the most practically important questions of our time.

THE INFORMATION ECOSYSTEM: You are living in the most information-dense environment in human history, combined with the most sophisticated persuasion and manipulation technologies ever developed. Recommendation algorithms designed to maximize engagement exploit psychological vulnerabilities — specifically the tendency toward outrage, fear, and tribal confirmation — to keep you on platforms. The result is a systematic distortion of perceived reality: what seems prevalent, urgent, and true is determined largely by what generates engagement, not by what is actually prevalent, urgent, or true.

EPISTEMIC HUMILITY: The history of human knowledge is a history of being wrong — often confidently and collectively wrong — about major questions. The Earth being flat. Disease caused by miasma. Eugenics as science. The economy self-regulating. Genuine intellectual integrity requires holding beliefs with a confidence proportional to the evidence, actively seeking disconfirming evidence, and being genuinely willing to change your mind.

FIRST PRINCIPLES THINKING: Elon Musk, Charlie Munger, and other influential thinkers emphasize reasoning from first principles — stripping away assumptions and conventional wisdom to identify what is fundamentally true, then building up from there. Most thinking is reasoning by analogy: "this is like that other thing we know." First principles thinking asks: what can I actually verify to be true? What follows necessarily from what is verified?

INFORMATION DIET: Just as physical diet shapes physical health, information diet shapes intellectual and emotional health. Seeking out diverse, high-quality sources — including sources that challenge your existing views — produces more accurate mental models. Mono-diet information consumption — only sources that confirm existing views — produces distorted mental models while feeling more satisfying.

YOUR MIND IS YOUR SOVEREIGNTY: In a world of sophisticated manipulation, the ability to think clearly, independently, and honestly is the most fundamental form of freedom. It cannot be taken from you unless you surrender it.`,
prompt:"Audit your information sources. Where do you get most of your information about the world? What are the likely biases and incentives of those sources? What would a genuinely diverse, balanced information diet look like for you? What uncomfortable sources might you need to add?"},
{title:"The Architecture of Civilization — How Societies Organize",type:"quiz",xp:60,teach:`Understanding how human societies organize themselves — the different possible architectures of governance, economy, and social structure — is essential for anyone who wants to build new ones or reform existing ones.

GOVERNANCE MODELS: Direct democracy (citizens vote directly on all decisions — used in ancient Athens and Swiss cantons) vs representative democracy (citizens elect representatives who govern on their behalf) vs technocracy (rule by experts) vs meritocracy (leadership determined by demonstrated ability) vs oligarchy (rule by a small wealthy elite) vs consensus-based governance (decisions made only when all parties agree). Each has different strengths and failure modes.

ECONOMIC MODELS: Capitalism (private ownership, market allocation, profit motive) vs socialism (collective or state ownership, central planning) vs mixed economy (both) vs gift economy (exchange based on generosity without expectation of return) vs solidarity economy (economic activity oriented toward social and environmental benefit rather than profit maximization). The global economy has never been purely any of these — all real economies are mixtures.

SOCIAL ORGANIZATION: Nuclear family (two adults and children) vs extended family networks vs intentional communities (people who deliberately choose to live together around shared values) vs communes vs tribal structures vs urban anonymity. Each creates different patterns of child-rearing, elder care, resource sharing, and social support.

SCALING PROBLEMS: Political scientist Robin Dunbar identified that humans can maintain genuine social relationships with approximately 150 people — "Dunbar's number." Most human institutions and communities that succeed at the 150-person scale fail when they scale to thousands or millions, because the social mechanisms that work for known individuals don't scale to strangers. This explains why large organizations require formal rules and bureaucracy — the informal relational mechanisms that govern small groups no longer function.

THE NEW EARTH: Throughout history, periods of civilizational transition have been characterized by the emergence of new organizational forms alongside the decline of old ones. The internet has made possible forms of coordination, governance, and community that were impossible before — distributed, transparent, permissionless, and global.`,
q:[{q:"What is Robin Dunbar's key insight about human social groups?",o:["Humans can manage any size group","Humans can maintain genuine social relationships with approximately 150 people","Large groups are always more effective","Democracy only works in small groups"],a:1},{q:"What distinguishes a solidarity economy from conventional capitalism?",o:["It uses cryptocurrency","It is oriented toward social and environmental benefit rather than profit maximization","It has no money","It is communist"],a:1},{q:"What is first principles thinking?",o:["Learning from history","Following conventional wisdom","Stripping away assumptions to identify what is fundamentally true and building up from there","Trusting experts"],a:2},{q:"Why do large organizations require formal bureaucracy according to Dunbar's research?",o:["Because they have more money","Because the informal relational mechanisms that govern small groups don't scale to strangers","Because governments require it","For efficiency"],a:1}]},
],
emotional:[
{title:"Shadow Work — Integrating the Disowned Self",type:"journal",xp:60,teach:`Carl Jung's concept of the Shadow — one of the most practically useful ideas in the history of psychology — refers to the parts of yourself that you have disowned, rejected, suppressed, or denied. Not just the "dark" parts, but any parts that were unacceptable in your family system or culture: weakness, anger, sexuality, ambition, grief, neediness, vulnerability, or even gifts and strengths that didn't fit the role you were assigned.

The core insight is that what we deny does not disappear — it goes underground, into the unconscious, where it influences our behavior without our awareness. Jung said: "Until you make the unconscious conscious, it will direct your life and you will call it fate."

THE SHADOW IN DAILY LIFE: You can recognize your shadow material by what triggers you most strongly in others. The quality in someone else that makes you disproportionately reactive — angry, disgusted, contemptuous — is often something you have denied in yourself. This is called projection. If someone's arrogance infuriates you, there may be disowned ambition or pride in yourself. If someone's neediness repels you, there may be unacknowledged vulnerability in yourself.

Shadow also appears in what you strongly idealize in others — qualities you have exiled from yourself and seek externally. The person who puts others on pedestals is often denying those same qualities in themselves.

INTEGRATION, NOT ELIMINATION: Shadow work is not about becoming someone who acts out every impulse. It is about integrating — consciously acknowledging, understanding, and metabolizing — what was previously unconscious. When you integrate shadow material, you gain access to the energy that was bound up in suppressing it. Many people find that integrating their shadow leads to increased creativity, vitality, and authentic power.

CULTURAL SHADOW: Communities, nations, and civilizations have collective shadows — the aspects of their history and nature they have collectively denied. Reckoning with collective shadow is among the most difficult and important work any society can undertake.`,
prompt:"Identify 2-3 qualities in other people that trigger a strong negative reaction in you. For each: is there any version of this quality that you might have exiled in yourself? What would it mean to acknowledge and integrate that part?"},
{title:"Conscious Communication — Language as a Tool for Connection",type:"quiz",xp:56,teach:`Most human conflict — in relationships, communities, organizations, and between nations — is rooted in communication failures. Developing genuinely sophisticated communication skills is among the most high-leverage investments you can make.

NONVIOLENT COMMUNICATION (NVC): Developed by Marshall Rosenberg, NVC is a communication framework built on the insight that all human behavior is an attempt to meet universal needs — safety, connection, autonomy, meaning, fairness, etc. — and that conflict arises when the strategies people use to meet their needs clash, not from incompatible needs themselves. The NVC process: 1) Observations (factual, non-evaluative) 2) Feelings (genuinely felt emotions, not disguised judgments) 3) Needs (universal human needs behind the feelings) 4) Requests (specific, positive, doable). "You always interrupt me" (evaluation/blame) → "In the last three conversations, you spoke before I finished my sentences [observation]. I felt frustrated [feeling] because I need to feel heard [need]. Would you be willing to let me finish before responding? [request]"

ACTIVE LISTENING: Research by psychologist Carl Rogers found that simply feeling genuinely heard — not evaluated, not advised, not compared — is itself profoundly healing. Active listening means listening to understand, not to respond; asking questions that deepen the speaker's own understanding; reflecting back what you hear to confirm accuracy; tolerating silence.

HIGH CONTEXT vs LOW CONTEXT CULTURES: Anthropologist Edward Hall identified that cultures differ dramatically in how much is communicated explicitly vs implicitly. Low context cultures (Germany, Scandinavia, United States) communicate meaning primarily through explicit verbal content — say what you mean. High context cultures (Japan, most of Middle East and Africa, Latin America) communicate meaning through relationship, hierarchy, nonverbal cues, and what is NOT said. Cross-cultural communication failures often result from these different assumptions.

DIFFICULT CONVERSATIONS: Research by Harvard Negotiation Project found that virtually all difficult conversations contain three layers: the substantive issue, a feelings layer (unexpressed emotions on both sides), and an identity layer (what the conversation implies about who I am, whether I am competent, good, lovable). Most people address only the surface layer and avoid the deeper ones, which is why the conversation doesn't resolve.`,
q:[{q:"What is the core insight of Nonviolent Communication?",o:["Conflict comes from evil people","All behavior is an attempt to meet universal needs; conflict comes from clashing strategies","You must always be nice","Feelings are not important in communication"],a:1},{q:"What did Carl Rogers find about the experience of feeling genuinely heard?",o:["It makes people dependent","Being genuinely heard — without evaluation or advice — is itself profoundly healing","It only works in therapy","People prefer advice to being heard"],a:1},{q:"What are the three layers in difficult conversations according to Harvard research?",o:["Past, present, future","Facts, opinions, emotions","The substantive issue, a feelings layer, and an identity layer","Words, tone, and body language"],a:2},{q:"What distinguishes high context from low context cultures?",o:["Educational levels","High context communicates through relationship and implication; low context through explicit verbal content","Economic development","Geographic location"],a:1}]},
],
frequency:[
{title:"Coherence — Aligning Mind, Heart & Action",type:"journal",xp:62,teach:`HeartMath Institute researchers identified a state called psychophysiological coherence — or simply coherence — that represents optimal functioning of the mind-body system. In coherence, the heart rhythm becomes smooth and ordered, the nervous system shifts toward parasympathetic dominance, brain hemispheres synchronize, and virtually every measurable biological parameter associated with health and performance improves.

The key finding: coherence is not primarily achieved by controlling thoughts — it is achieved by shifting heart-based emotional states, specifically toward genuine positive emotions like appreciation, gratitude, care, and love. These emotions produce coherent heart rhythms, which then send coherent signals to the brain, which then produces clearer thinking.

This inverts the conventional wisdom about the mind-body relationship. It is not that thinking good thoughts produces good feelings — it is that cultivating genuine heart-based states produces the physiological conditions for clearer, more effective thinking.

THE GLOBAL COHERENCE INITIATIVE: HeartMath's research has extended to suggesting that human electromagnetic fields collectively influence the Earth's electromagnetic field. During major global events — the September 11 attacks, the death of Princess Diana, major natural disasters — the global network of magnetometers (instruments measuring Earth's electromagnetic field) shows measurable changes. The hypothesis is that when large numbers of people experience intense synchronized emotion, their collective electromagnetic output affects the geomagnetic field. While this research is controversial, it points toward a radical possibility: human consciousness is not merely a private, internal phenomenon but has collective, perhaps even planetary, effects.

INTENTION AND COHERENCE: Studies on intentionality — the focused direction of attention and will — show that coherent internal states dramatically amplify the measurable effects of intention on external systems. Healers working in coherent states show stronger measurable effects on biological targets. This suggests that the quality of your inner state is not just about your private wellbeing — it affects what you are able to create in the world.

ALIGNMENT: Genuine effectiveness — in creativity, in relationships, in leadership, in building — requires alignment between what you think, what you feel, what you say, and what you do. Most human suffering and most organizational dysfunction comes from misalignment between these levels. The person who says they value honesty but withholds difficult truths. The organization that professes community values but makes decisions purely by financial metrics. Alignment is not a fixed achievement — it is an ongoing practice of noticing and closing the gap between values and action.`,
prompt:"Do an honest alignment audit. Where is there gap between what you say you value and how you actually spend your time, energy, and attention? What would genuine alignment look like in your daily life? What is one concrete step toward closing the largest gap?"},
],
spiritual:[
{title:"Building New Earth — The Vision and the Work",type:"journal",xp:68,teach:`The concept of a New Earth — a civilization organized around fundamentally different values and structures than the current dominant system — appears across spiritual traditions, indigenous prophecies, and progressive political visions. Teilhard de Chardin called it the Omega Point. Indigenous traditions speak of the Fifth World. The Hopi prophecy describes a time of great purification followed by a return to right relationship with the Earth. The Book of Revelation speaks of a new heaven and new earth. Buckminster Fuller called it a design science revolution.

What they all point toward, in different languages, is a civilization that serves life rather than consuming it.

THE DIAGNOSIS: The current dominant global civilization is characterized by extraction — taking from the Earth, from communities, from future generations — and accumulation — concentrating power and wealth into fewer and fewer hands. The ecological and social crises of this moment are not accidental failures of an otherwise sound system. They are the predictable outputs of a system designed around those values.

THE VISION: A regenerative civilization — one that restores rather than depletes, distributes rather than concentrates, belongs to the future as much as the present. Economies that work within ecological limits and distribute abundance justly. Governance that is genuinely participatory and accountable. Education that develops the full human being, not just economically productive workers. Healthcare that maintains wellness rather than managing disease. Agriculture that builds soil and biodiversity rather than depleting them. Communities of genuine belonging and mutual support.

THE WORK: This is not utopia — it is a direction. Every human system can be made more regenerative, more just, more alive. The question is not whether the new civilization will emerge — the old one is creating the conditions for change with every passing year. The question is what it will look like, and who will be shaping it.

You are reading this in a platform built on the premise that you are one of the people who will shape it. This is not flattery. It is a recognition that every civilization in history was built by people who decided to build something different than what existed. The Renaissance was built by artists, thinkers, and patrons who believed in human potential. The American founding was built by people who believed in self-governance. The civil rights movement was built by people who believed in universal dignity.

The New Earth will be built by people who believe it is possible — and who do the work.`,
prompt:"Write your personal vision of the New Earth — not abstractly, but specifically. What does daily life look like? What do children learn? How are decisions made? How are resources distributed? How are conflicts resolved? How does it feel to live there? Then write: what is your specific role in building it?"},
{title:"Legacy — Living a Life That Matters",type:"journal",xp:70,teach:`Contemplating legacy is not about ego or fame — it is about intentionality. It is about asking, before your life has been fully lived, what you want it to have meant. This question, taken seriously, changes how you make decisions in the present.

THE REGRET MINIMIZATION FRAMEWORK: Jeff Bezos, before starting Amazon, described imagining himself at 80 looking back on his life. "Which choice will I regret more?" he asked — staying in a stable job, or taking the risk of starting a company. The question reframed the decision from the anxious present to the perspective of a life already lived. When asked from the vantage point of 80, many short-term concerns that feel overwhelming become clearly small, and many long-term questions that we avoid become clearly important.

BRONNIE WARE'S RESEARCH: An Australian palliative care nurse, Bronnie Ware, spent years recording the regrets of the dying. The five most common: 1) I wish I'd had the courage to live a life true to myself, not what others expected. 2) I wish I hadn't worked so hard. 3) I wish I'd had the courage to express my feelings. 4) I wish I had stayed in touch with friends. 5) I wish I had let myself be happier. Notably absent: I wish I'd spent more time online, accumulated more money, or been more cautious.

CONTRIBUTION VS CONSUMPTION: A life organized primarily around consumption — of entertainment, status goods, experiences — leaves a fundamentally different residue than a life organized primarily around contribution. Viktor Frankl, working with people in a Nazi concentration camp, found that those who maintained a sense of meaning and purpose — something they were living FOR — survived at higher rates than those who had lost it. Meaning, he concluded, is a fundamental human need, not a luxury.

YOUR UNIQUE CONTRIBUTION: Every human being has a unique intersection of gifts, experiences, passions, and perspectives. There are problems in the world that your specific combination of these things is uniquely positioned to address. Finding the overlap between what you love, what you're good at, what the world needs, and what you can be supported doing — what the Japanese call ikigai — is the ongoing work of a life.

You have approximately 30,000 days if you live to 80. The number is not infinite. What will you make of them?`,
prompt:"Write yourself a letter from your 85-year-old self. What did you build? Who did you love? What did you heal? What will you have wished you had started earlier? What do you want to make sure you never let go of? Then write: based on that letter, what is one thing you will start doing differently this week?"},
],
creative:[
{title:"Entrepreneurship & Building in the New Economy",type:"quiz",xp:58,teach:`Entrepreneurship — the creation of new value through new organizations and ventures — is one of the primary mechanisms through which civilization advances and changes. Understanding how it actually works separates those who build things from those who only discuss building things.

THE PROBLEM OF PROBLEMS: Peter Thiel, investor and entrepreneur, argues that the best businesses are founded on the discovery of secrets — important truths that most people don't believe are true. The greatest opportunities are usually not in solving obvious problems that everyone can see (those are already crowded), but in addressing problems that most people either don't recognize or believe are unsolvable.

PRODUCT-MARKET FIT: The concept, developed by Marc Andreessen, describes the moment when a product satisfies a genuine market need — when people don't just use it but need it, tell others about it, and are upset when it doesn't work. Before product-market fit, everything is hypothesis. Most startups fail not because of poor execution but because they never found genuine product-market fit — they built something nobody needed, or needed badly enough to pay for.

MINIMUM VIABLE PRODUCT (MVP): Rather than building a complete product before testing it with users, the lean startup methodology says: identify your riskiest assumption, design the smallest possible test of it, run the test, and update your understanding. Build-Measure-Learn cycles should be as fast as possible. The goal is not to execute a plan — it is to find a plan that works.

UNIT ECONOMICS: Before scaling, understand whether your business actually creates value at the unit level. Customer Acquisition Cost (how much it costs to get one customer) vs Lifetime Value (how much that customer is worth over time). If it costs $100 to acquire a customer who generates $50 in lifetime value, scaling makes the problem bigger, not smaller.

VALUES-BASED BUILDING: The form of entrepreneurship most needed in the New Earth is not primarily oriented toward shareholder returns but toward genuine value creation — for users, for communities, for the planet. B Corporations, cooperative ownership models, and open source projects represent emerging alternatives to the conventional shareholder-primacy corporation.`,
q:[{q:"What is product-market fit?",o:["Getting a product into stores","When a product genuinely satisfies a market need — people need it and tell others","Marketing a product successfully","Having a perfect product"],a:1},{q:"What is the purpose of a Minimum Viable Product?",o:["Launching as cheaply as possible","Testing your riskiest assumption with the smallest possible test","Showing investors a prototype","Releasing an unfinished product"],a:1},{q:"Why do most startups fail according to lean startup methodology?",o:["Poor execution","Lack of funding","They never found genuine product-market fit — they built something nobody needed badly enough","Competition"],a:2},{q:"What distinguishes values-based building from conventional entrepreneurship?",o:["It is less profitable","It is oriented toward genuine value creation for users, communities, and planet rather than maximizing shareholder returns","It doesn't use money","It is nonprofit"],a:1}]},

earth:[
{title:"Regenerative Living — Practical Sovereignty",type:"journal",xp:62,teach:`Regenerative living means organizing your life such that your presence is net-positive for the living systems around you — that you leave the soil richer, the water cleaner, the community stronger, the next generation better equipped than if you hadn't been here.

This is both a practical and a philosophical commitment, and it operates at multiple scales simultaneously.

FOOD SOVEREIGNTY: Growing a meaningful portion of your own food — even in urban contexts — is one of the most grounding, empowering, and practical acts of sovereignty available. Community-supported agriculture, food forests, urban gardens, fermentation, preservation: these skills create genuine resilience and rebuild the knowledge base that industrial food systems erased in two generations.

ENERGY SOVEREIGNTY: Solar photovoltaic panels, small wind systems, and battery storage make genuine energy independence achievable for a growing percentage of households worldwide. The cost curves have made this financially compelling in most regions. Combined with efficiency (insulation, heat pumps, LED lighting), many households can reach near-zero energy bills while becoming resilient to grid failures.

WATER SOVEREIGNTY: Rainwater harvesting, greywater recycling, and watershed restoration create independence from municipal water systems and reduce the burden on strained water resources. In many regions, capturing rainfall during wet seasons for use during dry seasons represents the most important water sovereignty action available.

ECONOMIC SOVEREIGNTY: Building multiple income streams, eliminating debt, developing highly valued skills, building local trade and barter networks, and accumulating productive assets (land, tools, knowledge, relationships) creates genuine economic resilience that employment alone cannot provide.

COMMUNITY SOVEREIGNTY: Intentional community — people who deliberately choose to live in geographic proximity organized around shared values — is one of the most effective forms of resilience available. Shared resources, mutual support, collective knowledge, and the psychological richness of genuine belonging create conditions for thriving that isolated households cannot achieve regardless of income.

THE INTEGRATION: These forms of sovereignty are not separate — they reinforce each other. Food sovereignty supports health sovereignty. Energy sovereignty supports economic sovereignty. Community sovereignty amplifies all of the others.`,
prompt:"Design your personal regenerative life roadmap. In each domain — food, energy, water, economics, community, health — describe where you are now, where you want to be in 5 years, and the specific next step to begin moving there."},
],
practical:[
{title:"The Art of Learning — How to Learn Anything",type:"quiz",xp:60,teach:`In a world changing as fast as ours, the ability to learn rapidly and effectively — to acquire new skills and knowledge on demand — is among the most valuable capabilities a person can develop. The research on learning science has produced insights that most people never encounter, despite going through 16+ years of formal education.

SPACED REPETITION: The Ebbinghaus forgetting curve shows that without reinforcement, humans forget approximately 70% of new information within 24 hours, and 90% within a week. Spaced repetition — reviewing information at increasing intervals right before you would forget it — exploits this curve to achieve dramatically superior long-term retention with less total study time. Tools like Anki implement spaced repetition algorithms for any subject.

INTERLEAVING: Practicing multiple related skills in mixed sequence (ABCABC) rather than blocking (AAABBBCCC) produces more robust learning even though it feels harder and shows worse performance during practice sessions. The difficulty is the point — the brain works harder to retrieve information when contexts are mixed, building more flexible, durable knowledge.

RETRIEVAL PRACTICE: Being tested on material — or testing yourself — produces far stronger learning than re-reading or re-watching. This effect is so powerful and consistent it is called the Testing Effect. Explaining a concept out loud, writing a summary from memory, or quizzing yourself all activate the retrieval process that encodes learning deeply.

DESIRABLE DIFFICULTY: Research by Robert Bjork introduced the concept of desirable difficulties — conditions that slow apparent learning but accelerate actual learning. Harder practice produces better outcomes. This is counterintuitive because difficult learning FEELS less effective while it is happening, even when it produces far better long-term retention.

THE FEYNMAN TECHNIQUE: Physicist Richard Feynman's approach to learning: study a concept, then try to explain it simply enough that a child could understand it. Where you struggle to explain simply is where your understanding is actually shallow. Simplicity of explanation is the test of depth of understanding.

DELIBERATE PRACTICE: Anders Ericsson's research found that expertise is not primarily a matter of innate talent but of deliberate practice — training that operates at the edge of current ability, with immediate feedback, focused on specific weaknesses. 10,000 hours of deliberate practice, not just experience, is what produces genuine expertise.`,
q:[{q:"What does the Ebbinghaus forgetting curve show?",o:["We remember most things","Without reinforcement, we forget approximately 70% of information within 24 hours","Memory is random","Old people forget more"],a:1},{q:"What is the Testing Effect?",o:["Stress during tests hurts performance","Being tested or testing yourself produces far stronger learning than re-reading","Tests are the best way to evaluate students","Test-taking is a skill"],a:1},{q:"What is deliberate practice according to Ericsson's research?",o:["Practicing a lot","Any focused practice","Training at the edge of current ability with immediate feedback on specific weaknesses","Natural talent development"],a:2},{q:"What is the Feynman Technique for testing understanding?",o:["Reading multiple times","Taking detailed notes","If you can explain it simply enough for a child to understand, you actually understand it","Memorizing key facts"],a:2}]},
],
math:[
{title:"Calculus \u2014 The Mathematics of Change",type:"journal",xp:35,teach:`Calculus is the mathematics of change and motion — developed independently by Newton and Leibniz in the 17th century, and arguably the most powerful mathematical tool humans have ever created.

DIFFERENTIAL CALCULUS studies rates of change. The derivative of a function tells you the instantaneous rate of change at any point — the slope of the curve at that exact moment. Speed is the derivative of position. Acceleration is the derivative of speed. In physics, economics, biology, and engineering, almost everything interesting involves rates of change.

INTEGRAL CALCULUS studies accumulation. An integral adds up infinitely many infinitely small quantities. Area under a curve, total distance traveled, total work done — all integrals. The Fundamental Theorem of Calculus reveals that differentiation and integration are inverse operations, connecting them into one unified framework.

WHY IT MATTERS: Newton used calculus to prove that the same force that makes an apple fall makes the Moon orbit Earth. Maxwell used calculus to unify electricity and magnetism and predict electromagnetic waves (radio, light). Einstein used differential equations (advanced calculus) for relativity. Modern physics, engineering, economics, biology, and computer science are written in the language of calculus.

CALCULUS INTUITION: If you drive 60 mph for 2 hours, you traveled 120 miles. Speed × time = distance. But what if your speed constantly changes? You need calculus. The integral of your speed function gives you total distance. This is the essence of integral calculus — summing continuous change.`,prompt:"Calculus was invented to describe physical reality. Find one real-world phenomenon \u2014 a swinging pendulum, a population growing, a ball thrown in the air, an economy changing \u2014 and describe what calculus questions you could ask about it.",},
{title:"Statistics and Probability \u2014 Thinking Under Uncertainty",type:"quiz",xp:30,teach:`In a world of incomplete information, the ability to reason probabilistically — to make good decisions under uncertainty — is enormously valuable. Most people are poor probabilistic thinkers. You can be much better.

BASE RATES: The frequency at which something actually occurs in the real world. Human intuition consistently ignores base rates. When evaluating whether someone has a rare disease, most people focus on test accuracy and ignore how rare the disease is. A 99% accurate test for a disease affecting 1 in 10,000 people will produce more false positives than true positives in a random screening.

COGNITIVE BIASES IN PROBABILITY:
• Availability heuristic: overestimating the probability of dramatic, memorable events (plane crashes) and underestimating mundane ones (car accidents)
• Gambler's fallacy: thinking past random events influence future ones. Flipping 10 heads in a row doesn't make tails more likely on the 11th flip
• Confirmation bias: seeking evidence that confirms existing beliefs

EXPECTED VALUE: the probability-weighted average of all possible outcomes. If something has a 10% chance of winning $100 and 90% chance of winning nothing, expected value = 0.1 × $100 = $10. Decisions should generally be based on expected value rather than outcome — you can make a correct decision and get a bad outcome, or a foolish decision and get lucky.

STATISTICAL SIGNIFICANCE does not mean practical significance. A study can show a statistically significant effect that is too tiny to matter in practice. And large effects in small studies may not replicate. Understanding p-values, sample sizes, and effect sizes lets you evaluate scientific claims accurately.`,q:[{q:"What is a base rate?",o:["The most common outcome", "The actual frequency at which something occurs in the real world", "The average of all numbers", "The starting probability"],a:1},{q:"What is the gambler's fallacy?",o:["Believing you'll always win", "Thinking past random events influence future ones when they don't", "Gambling too much", "Believing luck exists"],a:1},{q:"What is expected value?",o:["The most likely outcome", "The best possible outcome", "The probability-weighted average of all possible outcomes", "The average of wins only"],a:2},{q:"Statistical significance means a result is:",o:["Always practically important", "Unlikely to be due to chance \u2014 but doesn't tell you if it matters practically", "Proven absolutely true", "Ready to apply everywhere"],a:1},],},
],
science:[
{title:"Quantum Physics \u2014 Reality at the Smallest Scale",type:"quiz",xp:35,teach:`Quantum mechanics is the most precisely tested theory in science — its predictions confirmed to one part in a trillion. It is also the most philosophically disturbing. As Richard Feynman said: 'If you think you understand quantum mechanics, you don't understand quantum mechanics.'

WAVE-PARTICLE DUALITY: Quantum objects behave as waves OR particles depending on whether they're observed. In the double-slit experiment, a single electron fired at a barrier with two slits passes through BOTH slits simultaneously as a wave — creating an interference pattern. Place a detector to observe which slit — and it immediately behaves as a particle, going through only one. The act of observation changes behavior. This has been confirmed thousands of times.

SUPERPOSITION: Before measurement, a quantum particle exists in a superposition of all possible states simultaneously. Schrödinger's cat thought experiment illustrates this absurdity scaled up: a cat in a box with a quantum trigger is simultaneously alive and dead until observed. This is not metaphor — it is literally how quantum mathematics describes reality.

ENTANGLEMENT: Two particles that have interacted become entangled — measuring one instantly determines something about the other, regardless of distance. Einstein called this 'spooky action at a distance' and refused to believe it. Bell's theorem (1964) proved it must be real. Experiments have confirmed entanglement across distances of over 1,200 kilometers.

THE MEASUREMENT PROBLEM: What causes the 'collapse' from superposition to definite state upon observation? No one knows. The Copenhagen interpretation, Many Worlds, pilot wave theory — all remain live interpretations. The deepest question: does consciousness play a role in quantum measurement? Physicists and philosophers are still debating.`,q:[{q:"What happens in the double-slit experiment when no detector is used?",o:["The electron goes through one slit", "The electron passes through both slits as a wave", "The electron disappears", "Nothing happens"],a:1},{q:"What is quantum entanglement?",o:["Particles getting physically tangled", "When particles become correlated so measuring one instantly affects the other regardless of distance", "A type of chemical bond", "Particles orbiting each other"],a:1},{q:"What is the 'measurement problem' in quantum mechanics?",o:["How to build better instruments", "Why quantum math is hard", "What causes the collapse from superposition to definite state upon observation", "How to measure very small things"],a:2},{q:"How precisely have quantum mechanics predictions been verified?",o:["About 80% accuracy", "Within 10%", "One part in a trillion", "Not yet verified"],a:2},],},
{title:"The Universe \u2014 Cosmology and Origins",type:"journal",xp:35,teach:`Cosmology — the study of the universe's origin, structure, and ultimate fate — addresses the largest questions of all.

THE BIG BANG: The universe began approximately 13.8 billion years ago from an extraordinarily hot, dense state. Not an explosion IN space — but an expansion OF space itself. In the first second, the universe went through extraordinary transformations. By 380,000 years, it cooled enough for atoms to form. The light released at that moment — the Cosmic Microwave Background — fills the universe today and has been mapped in extraordinary detail, confirming the Big Bang model.

STELLAR EVOLUTION AND NUCLEOSYNTHESIS: First-generation stars formed from hydrogen and helium. Inside their cores, nuclear fusion created heavier elements — carbon, oxygen, nitrogen. When massive stars died in supernovas, they scattered these elements into space. Second and third-generation stars (like our Sun) and their planets formed from this enriched material. Your carbon, oxygen, iron — all forged in stellar cores and dispersed by stellar explosions. You are genuinely made of stardust.

DARK MATTER AND DARK ENERGY: Ordinary matter — everything you can see — is only 5% of the universe's content. Dark matter (27%) is undetected matter that explains observed gravitational effects. Dark energy (68%) is the unknown force causing the universe's expansion to accelerate. We have no idea what either actually is.

THE FATE OF THE UNIVERSE: If dark energy continues, the universe will expand forever — eventually all stars will die, galaxies drift apart, and the universe will approach maximum entropy (heat death). This is the current leading model — though our understanding is far from complete.`,prompt:"You are made of elements forged in stellar explosions billions of years before Earth existed. The universe is 13.8 billion years old. Life capable of contemplating these facts has existed for maybe 0.001% of that time. What does this make you think about consciousness, meaning, and your place in existence?",},
],
health:[
{title:"Holistic Health \u2014 Body, Mind and Environment",type:"journal",xp:30,teach:`Health is not merely the absence of disease — the World Health Organization defines it as 'a state of complete physical, mental, and social wellbeing.' Understanding health as a holistic, interconnected system is foundational for taking genuine responsibility for your own.

EPIGENETICS: Your genes are not your destiny. Epigenetics — literally 'above genetics' — studies how environment, behavior, and experience influence gene expression without changing the DNA sequence itself. Stress, nutrition, sleep, exercise, trauma, toxic exposure — all affect which genes are switched on or off. Remarkably, some epigenetic changes can be inherited — meaning your grandparents' experiences may influence your biology. You have more influence over your genetic expression than was previously understood.

THE NERVOUS SYSTEM AND HEALTH: Chronic stress activates the sympathetic nervous system continuously — leading to elevated cortisol, inflammation, impaired immune function, accelerated cellular aging, and increased risk of virtually every chronic disease. The quality of your nervous system regulation — your ability to move between activation and rest — is one of the most important determinants of long-term health.

SOCIAL DETERMINANTS: Where you live, your income level, your educational opportunities, your exposure to pollution, your access to healthy food, your experience of discrimination — these 'social determinants' account for up to 80% of health outcomes, dwarfing the impact of healthcare itself. Health is deeply political and collective, not just individual.

HEALING TRADITIONS: Every culture in human history has developed sophisticated healing knowledge. Traditional Chinese Medicine, Ayurveda, indigenous herbal traditions, and other systems represent millennia of empirical observation. Many are being validated by modern research — curcumin's anti-inflammatory effects, the gut-brain axis, the power of community and meaning in healing.`,prompt:"Map your own health holistically \u2014 physical, mental, emotional, social, environmental. Where are you thriving? Where are there gaps? What one change would have the most positive ripple effects across multiple areas?",},
],
history:[
{title:"The Modern World \u2014 How We Got Here",type:"journal",xp:30,teach:`To understand the 21st century, you need to understand the series of revolutions — industrial, political, technological — that created it.

THE INDUSTRIAL REVOLUTION (1760-1840): Beginning in Britain, the shift from agricultural to industrial economy transformed human society more rapidly than any previous change. Steam power, mechanized manufacturing, urbanization, and the fossil fuel economy all emerged together. Life expectancy, living standards, and population grew dramatically for many — while creating brutal labor conditions, child labor, urban poverty, and environmental destruction. The carbon economy that now threatens the climate began here.

THE AGE OF REVOLUTIONS (1776-1848): The American Revolution (1776), French Revolution (1789), and the wave of European revolutions in 1848 represented a fundamental challenge to the idea that rulers had divine right to govern. Ideas of popular sovereignty, individual rights, and constitutional government spread globally. The contradictions were stark — the same American founders who wrote 'all men are created equal' owned enslaved people.

THE INFORMATION AGE: The invention of the internet, personal computing, and smartphones has transformed human society as profoundly as the printing press — perhaps more so. The printing press democratized information over 200 years. The internet did it over 20. Social media has created new forms of connection, community, and political organizing — and new forms of manipulation, polarization, and surveillance capitalism.

DECOLONIZATION: After World War II, colonized peoples across Africa, Asia, and the Caribbean won independence — though not without enormous struggle, and not without the legacy structures of colonialism remaining embedded in economic and political systems.

Where are we now? At a convergence of crises and opportunities — ecological, technological, economic, political — that makes this moment genuinely unique in human history.`,prompt:"We are living at a convergence of multiple major historical shifts simultaneously. Which one \u2014 climate, AI, inequality, political change, ecological collapse \u2014 do you think requires the most urgent attention? What is your role in it?",},
],
literacy:[
{title:"Philosophy of Language and Truth",type:"journal",xp:30,teach:`Language is not a neutral tool for transmitting facts. It is the medium through which we construct reality, share meaning, and organize collective action — and understanding its power and limitations is essential for clear thinking.

LANGUAGE AND THOUGHT: The Sapir-Whorf hypothesis proposes that the language you speak influences how you think and what you can perceive. Strong evidence: languages with many distinct words for different types of snow allow speakers to notice distinctions others miss. Languages without tense create different experiences of time. The words you have available shape what you can think.

FRAMING: How a question or issue is framed profoundly influences how it's understood and what responses seem reasonable. 'We lost 200 lives' and 'We saved 600 lives' may describe the same outcome — but produce very different emotional responses. Political language is almost entirely framing. 'Pro-life' vs 'anti-abortion.' 'Freedom fighters' vs 'terrorists.' 'Collateral damage' vs 'civilian deaths.' The same reality, framed differently.

TRUTH AND EPISTEMOLOGY: What does it mean for something to be true? Correspondence theory says truth means accurately describing reality. Coherence theory says truth is about internal consistency within a system of beliefs. Pragmatic theory says truth is what works — what reliably predicts and produces desired outcomes. These aren't just philosophy — they underlie real disagreements about science, religion, and politics.

POST-TRUTH: The contemporary information environment — characterized by social media bubbles, algorithmic amplification of outrage, sophisticated disinformation, and declining trust in institutions — has created conditions where shared factual reality is increasingly contested. This is genuinely dangerous for democracy and collective decision-making.`,prompt:"Analyze a piece of persuasive writing or speech \u2014 news article, political speech, advertisement, social media post. How does it use framing? What claims does it make? What does it leave out? What assumptions does it rely on?",},
],

  const saveXP=async(key,xp,b)=>{

      setLastActive(today);

            {streak>0&&<div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(251,146,60,.1)",border:"1px solid rgba(251,146,60,.25)",borderRadius:20,padding:"4px 14px"}}>
              <span style={{fontSize:14}}>🔥</span>
              <span className="fs" style={{fontSize:10,letterSpacing:1,color:"rgba(251,146,60,.9)"}}>{streak} DAY STREAK</span>
            </div>}

        <div className="glassg" style={{borderRadius:5,padding:22,marginBottom:22,borderLeft:"3px solid rgba(59,130,246,.4)"}}>

            const total=stageDomains.reduce((acc,dk)=>(CURRICULUM[s.k][dk]||[]).length+acc,0);

      {badge&&<div className="overlay" onClick={()=>setBadge(null)}><div className="modal"><div className="fd shimmer" style={{fontSize:18,letterSpacing:3,marginBottom:8}}>{badge}</div><button className="btn btng" style={{fontSize:9}} onClick={()=>setBadge(null)}>Continue</button></div></div>}

          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
            {TALENT_OPTIONS.map(t=><button key={t} className={"pill"+((giftMap.talents||[]).includes(t)?" on":"")} onClick={()=>setGiftMap(p=>({...p,talents:(p.talents||[]).includes(t)?p.talents.filter(x=>x!==t):[...(p.talents||[]),t]}))}>

        <div style={{marginBottom:16}}><label className="lbl">Sensitivity Profile</label><textarea value={giftMap.sensitivities} onChange={e=>setGiftMap(p=>({...p,sensitivities:e.target.value}))} rows={2} placeholder="What environments support focus? What overstimulates?"/></div>
        <div style={{marginBottom:16}}><label className="lbl">Leadership & Collaboration Style</label><textarea value={giftMap.leadership} onChange={e=>setGiftMap(p=>({...p,leadership:e.target.value}))} rows={2} placeholder="Natural role in groups? Leader, supporter, mediator, creator?"/></div>
        <div style={{marginBottom:16}}><label className="lbl">Creative Strengths</label><textarea value={giftMap.creative} onChange={e=>setGiftMap(p=>({...p,creative:e.target.value}))} rows={2} placeholder="Music, art, storytelling, engineering, caregiving, systems thinking?"/></div>
        <div style={{marginBottom:20}}><label className="lbl">Service Pathway</label><textarea value={giftMap.service} onChange={e=>setGiftMap(p=>({...p,service:e.target.value}))} rows={2} placeholder="Natural ways this child contributes to others..."/></div>
        <button className="btn btng" style={{width:"100%",justifyContent:"center",padding:14,fontSize:10}} onClick={saveGiftMap} disabled={gmSaving}>{gmSaving?"Saving...":"Save Gift Map"}</button>
      </div>
    </div>
  );

  /* ── STAGE VIEW ─────────────────────────────────────────────── */
  const stageData=STAGES.find(s=>s.k===stage);
  const sched=SCHEDULE[stage];
  if(view==="stage") return (
    <div className="page">
      <PageHead onBack={()=>{setView("home");setStage(null);}} title={stageData.l.toUpperCase()} sub={stageData.ages} tag={stageData.desc} grad="radial-gradient(circle at 32% 26%,#c5e0ff,#3b82f6 22%,#1d4ed8 46%,#0c1a42 90%,#050e22 100%)" glow={stageData.color}/>
      <div style={{maxWidth:700,margin:"0 auto",padding:"0 18px 80px"}}>
        <div className="glass" style={{borderRadius:4,padding:18,marginBottom:20}}>

          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {sched.blocks.map((b,i)=><div key={i} className="glass" style={{borderRadius:3,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>

                <div style={{fontSize:12,color:"rgba(237,232,223,.55)"}}>{b.desc}</div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:24}}>

            return(
            <button key={d.k} onClick={()=>{setDomain(d.k);setView("domain");}} className="glass lift" style={{borderRadius:4,padding:16,textAlign:"left",cursor:"pointer",border:"1px solid rgba(255,255,255,.1)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:20}}>{d.icon}</span>
                <span style={{fontSize:10,color:"rgba(237,232,223,.38)"}}>{done}/{lessons.length}</span>

    const [sel,setSel]=useState([]); const [checked,setChecked]=useState(false); const [qi,setQi]=useState(0);

        </div>
        <div style={{marginTop:16,display:"flex",gap:9}}>
          {!checked&&sel[qi]!==undefined&&<button className="btn btng" onClick={check} style={{fontSize:10}}>Check Answer</button>}
          {checked&&qi<lesson.q.length-1&&<button className="btn btng" onClick={next} style={{fontSize:10}}>Next</button>}
          {checked&&sel[qi]===q.a&&<div style={{fontSize:13,color:"#34d399",display:"flex",alignItems:"center",gap:6,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic"}}>Correct ✓</div>}

  function JournalLesson({lesson,saveXP,stage,domain,sid}){
    const [t,setT]=useState("");

  function BreathLesson({lesson,saveXP,stage,domain}){
    const [phase,setPhase]=useState("idle"); const [r,setR]=useState(0); const [bdone,setBdone]=useState(false);
    const complete=()=>{if(bdone)return;setBdone(true);saveXP&&saveXP(stage+"-"+domain+"-"+lesson.title,lesson.xp);};
    const start=()=>{if(phase!=="idle")return;let rnd=0;const rounds=lesson.rounds||4;const runPhase=(phases,pi)=>{if(pi>=phases.length){rnd++;setR(rnd);if(rnd<rounds)runPhase(phases,0);else{setPhase("done");setBdone(true);complete();}return;}const ph=phases[pi];setPhase(ph.l);setTimeout(()=>runPhase(phases,pi+1),(ph.s||4)*1000);};runPhase(lesson.phases||[{l:"Inhale",s:4},{l:"Hold",s:4},{l:"Exhale",s:4},{l:"Hold",s:4}],0);};
    const PC={idle:"rgba(20,184,166,.07)",in:"rgba(20,184,166,.36)",hold:"rgba(201,163,86,.26)",out:"rgba(59,130,246,.26)",done:"rgba(52,211,153,.28)"};
    const currentPhase=lesson.phases&&lesson.phases.find(p=>p.l===phase);
    const bgColor=phase==="idle"?PC.idle:phase==="done"?PC.done:currentPhase?`rgba(59,130,246,.26)`:PC.idle;
    return(
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <div onClick={start} style={{width:160,height:160,borderRadius:"50%",background:bgColor,border:"2px solid rgba(20,184,166,.5)",margin:"0 auto 24px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 1s ease"}}>
          <div>
            <div className="fs" style={{fontSize:14,color:bdone?"#34d399":"rgba(237,232,223,.65)",letterSpacing:2}}>{phase==="idle"?"TAP":phase==="done"?"DONE":phase.toUpperCase()}</div>
            {r>0&&<div style={{fontSize:11,color:"rgba(237,232,223,.55)",marginTop:4}}>{r}/{lesson.rounds||4}</div>}
          </div>
        </div>
        {phase==="idle"&&!bdone&&<div style={{fontSize:12,color:"rgba(237,232,223,.38)"}}>Tap the circle to begin</div>}
        {lesson.phases&&<div style={{display:"flex",justifyContent:"center",gap:12,marginTop:16}}>
          {lesson.phases.map((p,i)=><div key={i} style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:"rgba(237,232,223,.55)",marginBottom:2}}>{p.l}</div>
            <div className="tg" style={{fontSize:9}}>{p.s}s</div>
          </div>)}
        </div>}
      </div>
    );
  }
  if(view==="lesson"&&lesson) return(
    <div className="page">
      <PageHead onBack={()=>{setLesson(null);setView("domain");}} title={lesson.title.toUpperCase()} sub={dom?.l||""} tag={lesson.xp+" XP"} grad="radial-gradient(circle at 32% 26%,#c5e0ff,#3b82f6 22%,#1d4ed8 46%,#0c1a42 90%,#050e22 100%)" glow={dom?.color||"#3b82f6"}/>
      <div style={{maxWidth:640,margin:"0 auto",padding:"0 18px 80px"}}>
        {lesson.type==="quiz"&&<QuizLesson lesson={lesson} saveXP={saveXP} stage={stage} domain={domain}/>}
        {lesson.type==="journal"&&<JournalLesson lesson={lesson} saveXP={saveXP} stage={stage} domain={domain} sid={sid}/>}
        {lesson.type==="breath"&&<BreathLesson lesson={lesson} saveXP={saveXP} stage={stage} domain={domain}/>}
        {!["quiz","journal","breath"].includes(lesson.type)&&<JournalLesson lesson={lesson} saveXP={saveXP} stage={stage} domain={domain} sid={sid}/>}
      </div>
    </div>
  );
  return null;
}

/* ═══════════════════════════════════════════════════
   ADMIN PAGE

function AdminPage({onBack}){
  const [tab,setTab]=useState("stats");
  const [members,setMembers]=useState([]);
  const [ideas,setIdeas]=useState([]);
  const [barters,setBarters]=useState([]);
  const [offgridList,setOffgridList]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState("");
  const [search,setSearch]=useState("");

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),3000);};
  const [annText,setAnnText]=useState("");
  const [annSending,setAnnSending]=useState(false);

  const sendAnnouncement=async()=>{
    if(!annText.trim())return;
    setAnnSending(true);
    try{
      // Save announcement
      const id="ann"+Date.now();
      await DB.set("announcement:"+id,{id,body:annText,ts:Date.now()});
      // Send notification to all members
      let sent=0;
      for(const m of members){
        try{await sendNotif(m.uid,"message","📣 EOS Announcement: "+annText.slice(0,60)+(annText.length>60?"...":""),"map");sent++;}catch(e){}
      }
      setAnnText("");
      showToast("Announcement sent to "+sent+" souls ✦");
    }catch(e){showToast("Error sending announcement");}
    setAnnSending(false);
  };

  useEffect(()=>{(async()=>{
    setLoading(true);
    try{
      const pk=await DB.list("profile:");
      const pi=await Promise.all(pk.map(k=>DB.get("profile:"+k)));
      const validProfiles=pi.filter(Boolean);
      const accts=await Promise.all(validProfiles.map(p=>DB.get("acct:"+p.uid)));
      const merged=validProfiles.map((p,i)=>({...p,...(accts[i]?{createdAt:accts[i].createdAt,email:accts[i].email}:{})}));
      setMembers(merged.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));

      const gpk=await DB.list("gov:");
      const gpi=await Promise.all(gpk.map(k=>DB.get("gov:"+k)));
      setIdeas(gpi.filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0)));

      const bk=await DB.list("barter:");
      const bi=await Promise.all(bk.map(k=>DB.get("barter:"+k)));
      setBarters(bi.filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0)));

      const og=await DB.get("offgrid-interest");
      setOffgridList(og||[]);
    }catch(e){}
    setLoading(false);
  })();},[]);

  const [confirmDelete,setConfirmDelete]=useState(null);

  const deleteAccount=async(m)=>{
    try{
      await DB.set("profile:"+m.uid,null);
      await DB.set("acct:"+m.uid,null);
      await DB.set("learn-xp:"+m.uid,null);
      await DB.set("gift-map:"+m.uid,null);
      setMembers(p=>p.filter(x=>x.uid!==m.uid));
      setConfirmDelete(null);
      showToast(m.name+"'s account has been removed");
    }catch(e){showToast("Error removing account");}
  };

  const removePost=async(type,item)=>{
    try{
      if(type==="idea"){await DB.set("gov:"+item.id,null);setIdeas(p=>p.filter(x=>x.id!==item.id));}
      if(type==="barter"){await DB.set("barter:"+item.id,null);setBarters(p=>p.filter(x=>x.id!==item.id));}
      showToast("Post removed");
    }catch(e){}
  };

  const filtered=members.filter(m=>!search||
    m.name?.toLowerCase().includes(search.toLowerCase())||
    m.email?.toLowerCase().includes(search.toLowerCase())||
    m.location?.toLowerCase().includes(search.toLowerCase())
  );

  // Location breakdown
  const locationMap={};
  members.forEach(m=>{if(m.location){const k=m.location.trim();locationMap[k]=(locationMap[k]||0)+1;}});
  const topLocations=Object.entries(locationMap).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // Values breakdown
  const valuesMap={};
  members.forEach(m=>(m.values||[]).forEach(v=>{valuesMap[v]=(valuesMap[v]||0)+1;}));
  const topValues=Object.entries(valuesMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const newThisWeek=members.filter(m=>(m.createdAt||0)>Date.now()-7*864e5).length;
  const newThisMonth=members.filter(m=>(m.createdAt||0)>Date.now()-30*864e5).length;

  const TABS=["stats","members","content","offgrid"];
  const TAB_ICONS={stats:"📊",members:"👥",content:"📋",offgrid:"🌿"};

  return(
    <div className="page">
      <PageHead onBack={onBack} title="ADMIN" sub="EOS Command Centre" tag={members.length+" souls in the civilization"} grad="radial-gradient(circle at 32% 26%,#1e2235,#1a2545 30%,#162050 60%,#0a1020 100%)" glow="rgba(201,163,86,.5)"/>
      {toast&&<div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",zIndex:500,background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.3)",borderRadius:4,padding:"10px 22px",fontSize:12,color:"#34d399",fontFamily:"'Cinzel',serif",letterSpacing:1}}>{toast}</div>}
      {confirmDelete&&<div className="overlay" onClick={()=>setConfirmDelete(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380,textAlign:"center"}}>
          <div style={{fontSize:24,marginBottom:12}}>⚠️</div>
          <div className="fd shimmer" style={{fontSize:14,letterSpacing:3,marginBottom:10}}>REMOVE ACCOUNT</div>
          <div style={{fontSize:13,color:"rgba(237,232,223,.68)",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",lineHeight:1.7,marginBottom:6}}>You are about to permanently remove</div>
          <div style={{fontSize:16,color:"#EDE8DF",fontFamily:"'Cinzel',serif",letterSpacing:1,marginBottom:6}}>{confirmDelete.name}</div>
          <div style={{fontSize:12,color:"rgba(237,232,223,.55)",marginBottom:24}}>{confirmDelete.email}</div>
          <div style={{fontSize:12,color:"rgba(237,232,223,.55)",marginBottom:24,lineHeight:1.6}}>This will delete their profile, account, and all personal data. This cannot be undone.</div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <button className="btn btng" style={{fontSize:9,padding:"10px 22px"}} onClick={()=>setConfirmDelete(null)}>Cancel</button>
            <button onClick={()=>deleteAccount(confirmDelete)} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.35)",borderRadius:3,color:"rgba(239,68,68,.9)",cursor:"pointer",fontSize:9,padding:"10px 22px",fontFamily:"'Cinzel',serif",letterSpacing:1}}>Yes, Remove</button>
          </div>
        </div>
      </div>}
      <div style={{maxWidth:860,margin:"0 auto",padding:"0 18px 80px"}}>

        <div style={{display:"flex",gap:7,marginBottom:24,flexWrap:"wrap"}}>
          {TABS.map(t=><button key={t} onClick={()=>setTab(t)} className={tab===t?"btn btng":"glass"} style={{fontSize:9,padding:"8px 16px",borderRadius:3,letterSpacing:1,fontFamily:"'Cinzel',serif",cursor:"pointer",color:tab===t?"":"rgba(237,232,223,.8)"}}>{TAB_ICONS[t]} {t.toUpperCase()}</button>)}
        </div>

        {loading&&<div style={{textAlign:"center",padding:60,color:"rgba(237,232,223,.68)",fontStyle:"italic",fontFamily:"'Cormorant Garamond',serif",fontSize:16}}>Loading civilization data...</div>}

            <div style={{display:"flex",gap:10}}>
              <input value={annText} onChange={e=>setAnnText(e.target.value)} placeholder="Write an announcement..." style={{flex:1,padding:"10px 14px",fontSize:12}} onKeyDown={e=>e.key==="Enter"&&sendAnnouncement()}/>
              <button className="btn btng" style={{fontSize:9,padding:"10px 18px",whiteSpace:"nowrap"}} onClick={sendAnnouncement} disabled={annSending||!annText.trim()}>{annSending?"Sending...":"Send ✦"}</button>

                </div>

            );})}
          </div>
        </div>}

      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  render(){if(this.state.err)return <div style={{color:"#C9A356",padding:40,fontFamily:"Cinzel,serif",fontSize:12,letterSpacing:2}}>Something went wrong. <button onClick={()=>this.setState({err:null})} style={{background:"none",border:"1px solid rgba(201,163,86,.3)",color:"#C9A356",cursor:"pointer",padding:"6px 14px",fontFamily:"Cinzel,serif",fontSize:11,marginLeft:12}}>Retry</button></div>;return this.props.children;}
}

    try{
      const sess=LS.get("sess");
      if(sess&&sess.uid){
        const profile=await DB.get("profile:"+sess.uid);
        setAuthUser(sess);
        if(profile) setUser(profile);
        setScreen("map");
      }
    }catch(e){}
  })();},[]);

  const handleAuth=async({uid,email,isNew,profile})=>{
    if(isNew){
      setAuthUser({uid,email});
      setTimeout(()=>setScreen("profile-setup"),0);
      return;
    }
    let p=profile;
    if(!p){try{p=await DB.get("profile:"+uid);}catch(e){}}
    setAuthUser({uid,email});
    if(p) setUser(p);
    setScreen("map");
  };

  const logout=async()=>{
    await LS.del("sess");
    setAuthUser(null);setUser(null);setScreen("entry");
  };

  if(screen==="entry") return <><Sky/><Entry onEnter={()=>setScreen("auth")} onAdmin={()=>setScreen("admin")}/></>;
  if(screen==="auth") return <><Sky/><AuthPage onAuth={handleAuth}/></>;
  if(screen==="profile-setup"&&authUser) return <><Sky/><ProfileSetupPage uid={authUser.uid} email={authUser.email} onDone={profile=>{setUser(profile);setScreen("welcome");}}/></>;
  if(screen==="welcome"&&user) return <WelcomeScreen user={user} onDone={()=>setScreen("map")}/>;
  if(screen==="map") return <><Sky/><IslandMap onNav={k=>goto(k)} onLogout={logout} user={user} sid={sid}/></>;
  if(screen==="admin") return <ErrorBoundary><AdminPage onBack={()=>setScreen("entry")}/></ErrorBoundary>;
  if(screen==="profile") return <ErrorBoundary><ProfilePage onBack={()=>goto("map")} sid={sid} user={user} setUser={setUser} onGoToCommunity={()=>goto("community")}/></ErrorBoundary>;
  if(screen==="community") return <ErrorBoundary><CommunityPage onBack={()=>goto("map")} user={user} sid={sid}/></ErrorBoundary>;
  if(screen==="culture") return <ErrorBoundary><CulturePage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="exchange") return <ErrorBoundary><ExchangePage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="wellness") return <ErrorBoundary><WellnessPage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="creation") return <ErrorBoundary><CreationPage onBack={()=>goto("map")} user={user}/></ErrorBoundary>;
  if(screen==="learning") return <ErrorBoundary><LearningPage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="governance") return <ErrorBoundary><GovernancePage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  if(screen==="offgrid") return <ErrorBoundary><OffGridPage onBack={()=>goto("map")} sid={sid} user={user}/></ErrorBoundary>;
  return null;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);

</script>
</body>
</html>
